// ── TEXT BOX ENGINE ──────────────────────────────────────
function startTextDrag(dbox,startX,startY,e){
  if(activeTextBox)bakeTextBox();
  const canvas=dbox.querySelector('.draw-canvas');
  const canvasRect=canvas.getBoundingClientRect();

  const overlay=$('draw-textbox-overlay');
  overlay.innerHTML='';overlay.classList.add('active');
  overlay.style.position='fixed';
  overlay.style.left=canvasRect.left+'px';overlay.style.top=canvasRect.top+'px';
  overlay.style.width=canvasRect.width+'px';overlay.style.height=canvasRect.height+'px';
  overlay.style.pointerEvents='auto';

  const box=document.createElement('div');
  box.className='dtb-overlay-box';
  box.style.left=startX+'px';box.style.top=startY+'px';
  box.style.width='4px';box.style.height='4px';

  // contenteditable editor
  const ed=document.createElement('div');
  ed.className='dtb-overlay-editor';
  ed.contentEditable='true';ed.spellcheck=true;
  ed.setAttribute('data-placeholder','Type here...');
  ed.style.fontFamily=txtFont;ed.style.fontSize=txtSize+'px';
  ed.style.fontWeight=txtBold?'700':'400';
  ed.style.fontStyle=txtItalic?'italic':'normal';
  ed.style.textAlign=txtAlign;ed.style.color=drawColor;

  // Handles
  const moveHandle=document.createElement('div');
  moveHandle.className='dtb-overlay-handle dtb-oh-move';
  moveHandle.textContent='⠿';moveHandle.title='Move text box';
  const seHandle=document.createElement('div');seHandle.className='dtb-overlay-handle dtb-oh-se';
  const eHandle=document.createElement('div');eHandle.className='dtb-overlay-handle dtb-oh-e';
  const sHandle=document.createElement('div');sHandle.className='dtb-overlay-handle dtb-oh-s';
  const bakeBtn=document.createElement('button');bakeBtn.className='dtb-bake-btn';bakeBtn.textContent='✓ Place text';
  const cancelBtn=document.createElement('button');cancelBtn.className='dtb-cancel-btn';cancelBtn.textContent='Cancel';

  box.appendChild(ed);box.appendChild(moveHandle);
  box.appendChild(seHandle);box.appendChild(eHandle);box.appendChild(sHandle);
  box.appendChild(bakeBtn);box.appendChild(cancelBtn);
  overlay.appendChild(box);

  activeTextBox={box,ta:ed,dbox,canvasRect};

  // Initial drag to define size
  let dragging=true;
  function onDragMove(ev){
    if(!dragging)return;
    const mx=ev.clientX-canvasRect.left,my=ev.clientY-canvasRect.top;
    box.style.left=Math.min(startX,mx)+'px';box.style.top=Math.min(startY,my)+'px';
    box.style.width=Math.max(60,Math.abs(mx-startX))+'px';
    box.style.height=Math.max(40,Math.abs(my-startY))+'px';
  }
  function onDragUp(){
    dragging=false;
    document.removeEventListener('mousemove',onDragMove);
    document.removeEventListener('mouseup',onDragUp);
    box.style.width=Math.max(120,parseInt(box.style.width))+'px';
    box.style.height=Math.max(60,parseInt(box.style.height))+'px';
    ed.focus();
  }
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('mouseup',onDragUp);

  // Resize handles
  mkOverlayResize(seHandle,box,'se');
  mkOverlayResize(eHandle,box,'e');
  mkOverlayResize(sHandle,box,'s');

  // Move handle
  (function(){
    let mx,my,bx,by,on=false;
    moveHandle.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();on=true;
      mx=e.clientX;my=e.clientY;
      bx=parseInt(box.style.left)||0;by=parseInt(box.style.top)||0;
    });
    document.addEventListener('mousemove',e=>{
      if(!on)return;
      box.style.left=Math.max(0,bx+(e.clientX-mx))+'px';
      box.style.top=Math.max(0,by+(e.clientY-my))+'px';
    });
    document.addEventListener('mouseup',()=>{on=false;});
  })();

  // Bake / cancel
  bakeBtn.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();});
  bakeBtn.addEventListener('click',e=>{e.stopPropagation();bakeTextBox();});
  cancelBtn.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();});
  cancelBtn.addEventListener('click',e=>{e.stopPropagation();cancelTextBox();});

  ed.addEventListener('keydown',e=>e.stopPropagation());
  ed.addEventListener('mousedown',e=>e.stopPropagation());
}

function mkOverlayResize(hdl,box,dir,tbx){
  let sx,sy,sw,sh,on=false;
  hdl.addEventListener('mousedown',e=>{
    e.preventDefault();e.stopPropagation();on=true;
    sx=e.clientX;sy=e.clientY;sw=parseInt(box.style.width);sh=parseInt(box.style.height);
  });
  document.addEventListener('mousemove',e=>{
    if(!on)return;
    const dx=e.clientX-sx,dy=e.clientY-sy;
    if(dir==='se'||dir==='e')box.style.width=Math.max(60,sw+dx)+'px';
    if(dir==='se'||dir==='s')box.style.height=Math.max(40,sh+dy)+'px';
  });
  document.addEventListener('mouseup',()=>{on=false;});
}

function bakeTextBox(){
  if(!activeTextBox)return;
  const {box,ta:ed,dbox,canvasRect}=activeTextBox;
  const hasContent=ed&&(ed.textContent||'').trim().length>0;
  if(hasContent){
    const canvas=dbox.querySelector('.draw-canvas');
    const ctx=canvas.getContext('2d');
    // Get overlay position (it's fixed at canvasRect position)
    const overlay=$('draw-textbox-overlay');
    const overlayRect=overlay.getBoundingClientRect();
    const boxRect=box.getBoundingClientRect();
    const bx=Math.round(boxRect.left-overlayRect.left);
    const by=Math.round(boxRect.top-overlayRect.top);
    const bw=boxRect.width-12;

    // Walk the DOM nodes and render text run by run preserving bold/italic/color
    ctx.save();
    ctx.globalAlpha=drawOpacity;
    const lineH=Math.round(txtSize*1.45);
    let curY=by+6;

    function renderNode(node,inherited){
      if(node.nodeType===3){ // text node
        if(!node.textContent)return;
        ctx.font=`${inherited.italic?'italic ':''}${inherited.bold?'700':'400'} ${inherited.size}px ${inherited.family}`;
        ctx.fillStyle=inherited.color;
        ctx.textAlign=inherited.align;
        const xBase=inherited.align==='center'?bx+bw/2+6:inherited.align==='right'?bx+bw:bx+6;
        // Word wrap
        const words=node.textContent.split(' ');
        let cur='';
        words.forEach(w=>{
          const test=cur?cur+' '+w:w;
          if(ctx.measureText(test).width<=bw){cur=test;}
          else{
            if(cur){ctx.fillText(cur,xBase,curY);curY+=lineH;}
            cur=w;
          }
        });
        if(cur){ctx.fillText(cur,xBase,curY);curY+=lineH;}
      } else if(node.nodeType===1){
        const tag=node.tagName.toLowerCase();
        const cs=window.getComputedStyle(node);
        const next={
          bold: inherited.bold||(cs.fontWeight>=700||tag==='b'||tag==='strong'),
          italic: inherited.italic||(cs.fontStyle==='italic'||tag==='i'||tag==='em'),
          color: cs.color!=='rgba(0, 0, 0, 0)'?cs.color:inherited.color,
          size: inherited.size,
          family: inherited.family,
          align: cs.textAlign||inherited.align,
        };
        if(tag==='br'){curY+=lineH;return;}
        if(tag==='div'||tag==='p'){
          // block: render children then newline
          const prevY=curY;
          node.childNodes.forEach(ch=>renderNode(ch,next));
          if(curY===prevY)curY+=lineH; // empty block still advances
        } else {
          node.childNodes.forEach(ch=>renderNode(ch,next));
        }
      }
    }

    const edStyle=window.getComputedStyle(ed);
    const base={
      bold:edStyle.fontWeight>=700,italic:edStyle.fontStyle==='italic',
      color:edStyle.color,size:txtSize,family:txtFont,align:txtAlign
    };
    ctx.textBaseline='top';
    ed.childNodes.forEach(ch=>renderNode(ch,base));
    ctx.restore();
    pushHistory(dbox);
  }
  cancelTextBox();
}

function cancelTextBox(){
  if(!activeTextBox)return;
  $('draw-textbox-overlay').classList.remove('active');
  $('draw-textbox-overlay').innerHTML='';
  activeTextBox=null;
}

// ── TABLE ENGINE ─────────────────────────────────────────
const COLS='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
let activeTblCtx=null;

function closeTblCtx(){if(activeTblCtx){activeTblCtx.remove();activeTblCtx=null;}}
document.addEventListener('click',closeTblCtx);

// ── Formula evaluator ──────────────────────────────────
function evalCell(expr,getCellVal){
  expr=expr.trim();
  if(!expr.startsWith('='))return expr;
  let formula=expr.slice(1).trim().toUpperCase();
  try{
    // Replace SUM(A1:B3) style ranges
    formula=formula.replace(/(SUM|AVG|MIN|MAX|COUNT)\(([A-Z]+\d+):([A-Z]+\d+)\)/g,(m,fn,from,to)=>{
      const vals=getRangeVals(from,to,getCellVal);
      const nums=vals.map(Number).filter(v=>!isNaN(v));
      if(fn==='SUM')return String(nums.reduce((a,b)=>a+b,0));
      if(fn==='AVG')return nums.length?String(nums.reduce((a,b)=>a+b,0)/nums.length):'0';
      if(fn==='MIN')return nums.length?String(Math.min(...nums)):'0';
      if(fn==='MAX')return nums.length?String(Math.max(...nums)):'0';
      if(fn==='COUNT')return String(nums.length);
      return '0';
    });
    // Replace cell refs A1, B2 etc
    formula=formula.replace(/([A-Z]+)(\d+)/g,(m,col,row)=>{
      const v=getCellVal(col,parseInt(row));
      return isNaN(Number(v))?'0':(v||'0');
    });
    // Evaluate math
    const result=mathEval(formula);
    if(result===null||isNaN(result)||!isFinite(result))return '#ERR';
    return String(Math.round(result*1e10)/1e10);
  }catch(e){return '#ERR';}
}

function getRangeVals(from,to,getCellVal){
  const fromCol=from.replace(/\d/g,''),fromRow=parseInt(from.replace(/\D/g,''));
  const toCol=to.replace(/\d/g,''),toRow=parseInt(to.replace(/\D/g,''));
  const c1=COLS.indexOf(fromCol),c2=COLS.indexOf(toCol);
  const vals=[];
  for(let r=Math.min(fromRow,toRow);r<=Math.max(fromRow,toRow);r++){
    for(let c=Math.min(c1,c2);c<=Math.max(c1,c2);c++){
      vals.push(getCellVal(COLS[c],r));
    }
  }
  return vals;
}

// ── Create table element ──────────────────────────────
function mkTable(opts={}){
  const id=opts.id||String(gId());
  const name=opts.name||'Table';
  const rows=opts.rows||[['','',''],['','',''],['','','']];
  let colWidths=opts.colWidths||Array(rows[0]?rows[0].length:3).fill('80px');

  let selectedRow=-1,selectedCol=-1;
  let cellColors=opts.cellColors||[]; // [row][col] = color string
  let selStart=null,selEnd=null; // for multi-cell selection

  // Selection helpers at mkTable scope so they survive refresh()
  function clearSel(){
    el.querySelectorAll('.tbl-selected,.tbl-selecting').forEach(e=>e.classList.remove('tbl-selected','tbl-selecting'));
    selStart=null;selEnd=null;
  }
  function getSelRange(){
    if(!selStart||!selEnd)return null;
    return{r1:Math.min(selStart.r,selEnd.r),r2:Math.max(selStart.r,selEnd.r),
           c1:Math.min(selStart.c,selEnd.c),c2:Math.max(selStart.c,selEnd.c)};
  }
  function applySelHighlight(sel){
    el.querySelectorAll('.tbl-selected,.tbl-selecting').forEach(e=>e.classList.remove('tbl-selected','tbl-selecting'));
    if(!sel)return;
    el.querySelectorAll('td[data-row]').forEach(td=>{
      const r=+td.dataset.row,c=+td.dataset.col;
      if(r>=sel.r1&&r<=sel.r2&&c>=sel.c1&&c<=sel.c2)td.classList.add('tbl-selected');
    });
  }
  const el=document.createElement('div');
  el.className='tbl-box';el.dataset.id=id;el.dataset.type='table';
  el.style.left=(opts.x||120)+'px';el.style.top=(opts.y||120)+'px';
  el.style.width=(opts.w||420)+'px';
  if(opts.h)el.style.height=opts.h+'px';
  else el.style.height='320px';
  el.style.zIndex=nZ();

  function numCols(){return rows[0]?rows[0].length:3;}
  function getCellVal(col,row){
    const ci2=COLS.indexOf(col);
    const ri=row-1;
    if(ri<0||ri>=rows.length||ci2<0||ci2>=numCols())return '';
    const raw=rows[ri][ci2]||'';
    if(raw.startsWith('='))return evalCell(raw,getCellVal);
    return raw;
  }

  function buildTable(){
    // Sync colWidths length
    while(colWidths.length<numCols())colWidths.push('80px');
    while(colWidths.length>numCols())colWidths.pop();
    const colgroup='<colgroup><col style="width:28px">'+colWidths.map(w=>`<col style="width:${w}">`).join('')+'</colgroup>';
    const thead='<thead><tr><th class="tbl-row-header"></th>'+
      Array.from({length:numCols()},(_,i)=>`<th><div class="tbl-col-header">${COLS[i]}</div><div class="tbl-resize-handle" data-col="${i}"></div></th>`).join('')+'</tr></thead>';
    const tbody='<tbody>'+rows.map((row,ri)=>
      '<tr><td class="tbl-row-header">'+(ri+1)+'</td>'+
      row.map((val,ci2)=>{
        const displayed=val.startsWith('=')?evalCell(val,getCellVal):val;
        const isFormula=val.startsWith('=');
        const isErr=displayed==='#ERR';
        const cellColor=(cellColors[ri]&&cellColors[ri][ci2])||'';
        const tdStyle=cellColor?`background:${cellColor}`:'';
        const inpStyle=cellColor?`background:${cellColor}`:'';
        return`<td style="${tdStyle}" data-row="${ri}" data-col="${ci2}"><input class="tbl-cell-input${isFormula?' formula':''}${isErr?' error':''}" 
          style="${inpStyle}" data-row="${ri}" data-col="${ci2}" data-raw="${val.replace(/"/g,'&quot;')}"
          value="${displayed.replace(/"/g,'&quot;')}" spellcheck="false"></td>`;
      }).join('')+'</tr>'
    ).join('')+'</tbody>';
    const tblFont=opts.font||"'Inter',sans-serif";
    return`<table class="tbl-table" style="font-family:${tblFont}">${colgroup}${thead}${tbody}</table>`;
  }

  el.innerHTML=`
    <div class="tbl-header">
      <input class="tbl-name" value="${esc(name)}" spellcheck="false" readonly tabindex="-1">
      <div class="tbl-actions">
        <button class="tbl-btn del" title="Delete table">✕</button>
      </div>
    </div>
    <div class="tbl-wrap">${buildTable()}</div>
    <div class="tbl-footer">
      <button class="tbl-footer-btn" data-action="addrow" title="Add row below selection">+ Row</button>
      <button class="tbl-footer-btn" data-action="addcol" title="Add col after selection">+ Col</button>
      <button class="tbl-footer-btn" data-action="insrow" title="Insert row above selection">↑ Row</button>
      <button class="tbl-footer-btn" data-action="inscol" title="Insert col before selection">← Col</button>
      <div style="margin-left:auto;display:flex;align-items:center;gap:4px">
        <button class="tbl-color-btn" id="tbl-color-btn-${id}" title="Cell color"><span class="tbl-color-dot" id="tbl-color-dot-${id}" style="background:#ffffff"></span>Color</button>
        <button class="tbl-footer-btn" data-action="clearcolor" title="Clear cell color">✕</button>
        <button class="tbl-footer-btn" data-action="delrow">− Row</button>
        <button class="tbl-footer-btn" data-action="delcol">− Col</button>
      </div>
    </div>
    <div class="tbl-box-resize">◢</div>
    <div class="tbl-rrsz"></div>`;

  function refresh(){
    el.querySelector('.tbl-wrap').innerHTML=buildTable();
    wireTableEvents();
  }

  function wireTableEvents(){

    // Row header click - select entire row
    el.querySelectorAll('.tbl-row-header').forEach((rh,ri)=>{
      if(ri===0)return; // skip col-header row
      rh.addEventListener('click',e=>{
        e.stopPropagation();clearSel();
        selectedRow=ri-1; selectedCol=-1; // ri-1 because ri=0 is thead
        const row=rh.closest('tr');
        if(row)row.querySelectorAll('td').forEach(td=>td.classList.add('tbl-selected'));
      });
    });

    // Col header click - select entire column
    el.querySelectorAll('thead th').forEach((th,ci2)=>{
      if(ci2===0)return; // skip row-number header
      th.querySelector('.tbl-col-header')?.addEventListener('click',e=>{
        e.stopPropagation();clearSel();
        selectedCol=ci2-1; selectedRow=-1; // ci2-1 because ci2=0 is row-number col
        el.querySelectorAll('tbody tr').forEach(tr=>{
          const tds=[...tr.querySelectorAll('td')];
          if(tds[ci2])tds[ci2].classList.add('tbl-selected');
        });
      });
    });

    // Click anywhere in table to clear selection
    el.querySelector('.tbl-wrap').addEventListener('click',e=>{
      if(!e.target.closest('.tbl-row-header')&&!e.target.closest('.tbl-col-header')){
        clearSel();selectedRow=-1;selectedCol=-1;
      }
    });

    // Multi-cell selection
    let mSelecting=false;
    let selAnchor=null;
    let suppressMousedown=false;

    function focusCell(r,c){
      suppressMousedown=true;
      el.querySelector(`.tbl-cell-input[data-row="${r}"][data-col="${c}"]`)?.focus();
      requestAnimationFrame(()=>requestAnimationFrame(()=>{suppressMousedown=false;}));
    }

    // Drag selection using pointer capture on tbl-wrap
    const tblWrap=el.querySelector('.tbl-wrap');

    function getCellFromPoint(x,y){
      // Temporarily hide the tbl-wrap overlay and check element underneath
      // Instead use getBoundingClientRect of each td to find which cell contains point
      const tds=el.querySelectorAll('td[data-row]');
      for(const td of tds){
        const r=td.getBoundingClientRect();
        if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom){
          return{r:+td.dataset.row,c:+td.dataset.col};
        }
      }
      return null;
    }

    tblWrap.addEventListener('pointermove',e=>{
      if(!mSelecting)return;
      const cell=getCellFromPoint(e.clientX,e.clientY);
      if(!cell)return;
      if(!selEnd||selEnd.r!==cell.r||selEnd.c!==cell.c){
        selEnd=cell;
        applySelHighlight(getSelRange());
      }
    });

    tblWrap.addEventListener('pointerup',e=>{
      if(mSelecting){
        mSelecting=false;
        // Save the current selection
        const savedStart={...selStart}, savedEnd={...selEnd}, savedAnchor={...selAnchor};
        // After browser fires click/mousedown which resets selection, restore it
        setTimeout(()=>{
          selStart=savedStart;selEnd=savedEnd;selAnchor=savedAnchor;
          applySelHighlight(getSelRange());
        },0);
      }
    });
    document.addEventListener('pointerup',()=>{mSelecting=false;});

    el.querySelectorAll('.tbl-cell-input').forEach(inp=>{
      const ri=+inp.dataset.row, ci2=+inp.dataset.col;

      inp.addEventListener('mousedown',e=>{
        if(e.button!==0)return;
        e.stopPropagation();
        if(suppressMousedown||mSelecting)return;

        if(e.shiftKey&&selAnchor){
          selStart=selAnchor;
          selEnd={r:ri,c:ci2};
          applySelHighlight(getSelRange());
          e.preventDefault();
          return;
        }

        // Start fresh selection
        selAnchor={r:ri,c:ci2};
        selStart={r:ri,c:ci2};
        selEnd={r:ri,c:ci2};
        selectedRow=-1;selectedCol=-1;
        mSelecting=true;
        applySelHighlight(getSelRange());
        // Release pointer capture from input so tbl-wrap receives pointermove
        if(e.pointerId!==undefined){
          try{inp.releasePointerCapture(e.pointerId);}catch(ex){}
          try{tblWrap.setPointerCapture(e.pointerId);}catch(ex){}
        }
      });

      inp.addEventListener('keydown',e=>{
        e.stopPropagation();
        // Shift+Arrow: extend selection
        if(e.shiftKey&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
          e.preventDefault();
          if(!selAnchor){selAnchor={r:ri,c:ci2};}
          selStart=selAnchor;
          const sr=selEnd||{r:ri,c:ci2};
          let nr=sr.r,nc=sr.c;
          if(e.key==='ArrowUp')   nr=Math.max(0,nr-1);
          if(e.key==='ArrowDown') nr=Math.min(rows.length-1,nr+1);
          if(e.key==='ArrowLeft') nc=Math.max(0,nc-1);
          if(e.key==='ArrowRight')nc=Math.min(numCols()-1,nc+1);
          selEnd={r:nr,c:nc};
          applySelHighlight(getSelRange());
          focusCell(nr,nc);
          return;
        }

        // Tab/Enter - navigate, clear selection
        const inputs=[...el.querySelectorAll('.tbl-cell-input')];
        const idx2=inputs.indexOf(inp);
        if(e.key==='Tab'){
          e.preventDefault();clearSel();selAnchor=null;
          inputs[e.shiftKey?Math.max(0,idx2-1):Math.min(inputs.length-1,idx2+1)]?.focus();
          return;
        }
        if(e.key==='Enter'){
          e.preventDefault();clearSel();selAnchor=null;
          el.querySelector(`.tbl-cell-input[data-row="${ri+1}"][data-col="${ci2}"]`)?.focus()||inp.blur();
          return;
        }

        // Plain arrows - navigate, clear selection
        if(!e.shiftKey){
          if(e.key==='ArrowRight'&&inp.selectionEnd===inp.value.length){clearSel();selAnchor=null;inputs[Math.min(inputs.length-1,idx2+1)]?.focus();}
          if(e.key==='ArrowLeft'&&inp.selectionStart===0){clearSel();selAnchor=null;inputs[Math.max(0,idx2-1)]?.focus();}
          if(e.key==='ArrowDown'){e.preventDefault();clearSel();selAnchor=null;el.querySelector(`.tbl-cell-input[data-row="${ri+1}"][data-col="${ci2}"]`)?.focus();}
          if(e.key==='ArrowUp'){e.preventDefault();clearSel();selAnchor=null;el.querySelector(`.tbl-cell-input[data-row="${ri-1}"][data-col="${ci2}"]`)?.focus();}
        }
      });
    });

    // Cell inputs
    el.querySelectorAll('.tbl-cell-input').forEach(inp=>{
      const ri=+inp.dataset.row,ci2=+inp.dataset.col;
      inp.addEventListener('focus',()=>{
        lastFocusedCell=inp;
        inp.value=rows[ri][ci2]||'';
        inp.classList.remove('formula','error');
        showFnBubble(el);
      });
      inp.addEventListener('blur',()=>{
        setTimeout(()=>{
          if(fnBubble&&fnBubble.contains(document.activeElement))return;
          if(el.contains(document.activeElement))return;
          lastFocusedCell=null;
          hideFnBubble();
        },150);
      });
      inp.addEventListener('blur',()=>{
        const raw=inp.value;
        rows[ri][ci2]=raw;
        inp.dataset.raw=raw;
        // Show evaluated value
        if(raw.startsWith('=')){
          const result=evalCell(raw,getCellVal);
          inp.value=result;
          inp.classList.toggle('formula',result!=='#ERR');
          inp.classList.toggle('error',result==='#ERR');
        } else {
          inp.value=raw;
          inp.classList.remove('formula','error');
        }
        // Recalculate all formula cells
        el.querySelectorAll('.tbl-cell-input').forEach(other=>{
          const or=+other.dataset.row,oc=+other.dataset.col;
          if(other!==inp&&(rows[or][oc]||'').startsWith('=')){
            const result=evalCell(rows[or][oc],getCellVal);
            other.value=result;
            other.classList.toggle('formula',result!=='#ERR');
            other.classList.toggle('error',result==='#ERR');
          }
        });
        sched();
      });
      // keydown and mousedown handled in multi-sel block above
      // Right-click context menu
      inp.addEventListener('contextmenu',e=>{
        e.preventDefault();e.stopPropagation();
        showTblCtx(e.clientX,e.clientY,ri,ci2);
      });
    });

    // Column resize handles
    el.querySelectorAll('.tbl-resize-handle').forEach(hdl=>{
      const ci2=+hdl.dataset.col;
      let sx,sw,on=false;
      hdl.addEventListener('mousedown',e=>{
        e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();
        on=true;sx=e.clientX;
        sw=parseInt(colWidths[ci2])||80;hdl.classList.add('dragging');
      });
      document.addEventListener('mousemove',e=>{
        if(!on)return;
        colWidths[ci2]=Math.max(40,sw+(e.clientX-sx))+'px';
        el.querySelectorAll('colgroup col')[ci2+1].style.width=colWidths[ci2];
      });
      document.addEventListener('mouseup',()=>{if(on){on=false;hdl.classList.remove('dragging');sched();}});
    });
  }

  function showTblCtx(x,y,ri,ci2){
    closeTblCtx();
    const menu=document.createElement('div');menu.className='tbl-ctx-menu';
    const items=[
      {label:'Insert row above',action:()=>{rows.splice(ri,0,Array(numCols()).fill(''));refresh();sched();}},
      {label:'Insert row below',action:()=>{rows.splice(ri+1,0,Array(numCols()).fill(''));refresh();sched();}},
      {sep:true},
      {label:'Insert col left',action:()=>{rows.forEach(r=>r.splice(ci2,0,''));colWidths.splice(ci2,0,'80px');refresh();sched();}},
      {label:'Insert col right',action:()=>{rows.forEach(r=>r.splice(ci2+1,0,''));colWidths.splice(ci2+1,0,'80px');refresh();sched();}},
      {sep:true},
      {label:'Delete this row',danger:true,action:()=>{if(rows.length>1){rows.splice(ri,1);refresh();sched();}}},
      {label:'Delete this col',danger:true,action:()=>{if((rows[0]?rows[0].length:3)>1){rows.forEach(r=>r.splice(ci2,1));colWidths.splice(ci2,1);refresh();sched();}}},
    ];
    items.forEach(it=>{
      if(it.sep){const s=document.createElement('div');s.className='tbl-ctx-sep';menu.appendChild(s);return;}
      const row=document.createElement('div');row.className='tbl-ctx-item'+(it.danger?' danger':'');row.textContent=it.label;
      row.addEventListener('click',e=>{e.stopPropagation();closeTblCtx();it.action();});
      menu.appendChild(row);
    });
    document.body.appendChild(menu);activeTblCtx=menu;
    let left=x,top=y+2;
    if(left+180>window.innerWidth)left=window.innerWidth-184;
    if(top+250>window.innerHeight)top=y-252;
    menu.style.left=left+'px';menu.style.top=top+'px';
  }

  wireTableEvents();

  // Delete table
  el.querySelector('.del').addEventListener('click',()=>{
    inlineConfirm(el,'Delete this table?',()=>{el.remove();sched();});
  });

  // Footer buttons
  el.querySelector('.tbl-footer').addEventListener('click',e=>{
    const action=e.target.dataset.action;
    if(!action||action==='color'||action==='clearcolor')return;
    const sel=getSelRange();
    // Determine target row/col from drag selection or row/col header click
    const afterRow  = sel ? sel.r2 : selectedRow>=0 ? selectedRow : rows.length-1;
    const beforeRow = sel ? sel.r1 : selectedRow>=0 ? selectedRow : 0;
    const afterCol  = sel ? sel.c2 : selectedCol>=0 ? selectedCol : numCols()-1;
    const beforeCol = sel ? sel.c1 : selectedCol>=0 ? selectedCol : 0;

    if(action==='addrow'){rows.splice(afterRow+1,0,Array(numCols()).fill(''));}
    if(action==='insrow'){rows.splice(beforeRow,0,Array(numCols()).fill(''));}
    if(action==='addcol'){rows.forEach(r=>r.splice(afterCol+1,0,''));colWidths.splice(afterCol+1,0,'80px');}
    if(action==='inscol'){rows.forEach(r=>r.splice(beforeCol,0,''));colWidths.splice(beforeCol,0,'80px');}
    if(action==='delrow'&&rows.length>1){
      rows.splice(afterRow,1);selectedRow=-1;selStart=null;selEnd=null;
    }
    if(action==='delcol'&&numCols()>1){
      rows.forEach(r=>r.splice(afterCol,1));colWidths.splice(afterCol,1);selectedCol=-1;selStart=null;selEnd=null;
    }
    refresh();sched();
  });

  // Cell color palette
  const TBL_COLORS=[
    {id:'white',  bg:'#ffffff',label:'White'},
    {id:'yellow', bg:'#fff9c4',label:'Yellow'},
    {id:'green',  bg:'#d4edda',label:'Green'},
    {id:'blue',   bg:'#d0e8ff',label:'Blue'},
    {id:'pink',   bg:'#ffd6e0',label:'Pink'},
    {id:'purple', bg:'#e8d5f5',label:'Purple'},
    {id:'orange', bg:'#ffe0b2',label:'Orange'},
    {id:'red',    bg:'#ffcdd2',label:'Red'},
  ];
  let activeTblCpPopup=null;
  function closeTblCp(){if(activeTblCpPopup){activeTblCpPopup.remove();activeTblCpPopup=null;}}
  document.addEventListener('click',closeTblCp);

  function applyTblColor(color){
    const sel=getSelRange();
    const s=sel||(selectedRow>=0?{r1:selectedRow,r2:selectedRow,c1:0,c2:numCols()-1}:
                  selectedCol>=0?{r1:0,r2:rows.length-1,c1:selectedCol,c2:selectedCol}:null);
    if(!s)return;
    for(let r=s.r1;r<=s.r2;r++){
      if(!cellColors[r])cellColors[r]=[];
      for(let cc=s.c1;cc<=s.c2;cc++)cellColors[r][cc]=color;
    }
    const dot=el.querySelector('.tbl-color-dot');
    if(dot)dot.style.background=color;
    refresh();
    requestAnimationFrame(()=>applySelHighlight(getSelRange()));
    sched();
  }

  function showTblCpPopup(anchorEl){
    closeTblCp();
    const popup=document.createElement('div');popup.className='tbl-cp-popup open';
    TBL_COLORS.forEach(col=>{
      const sw=document.createElement('div');
      sw.className='tbl-cp-sw';sw.style.background=col.bg;sw.title=col.label;
      sw.addEventListener('click',e=>{e.stopPropagation();closeTblCp();applyTblColor(col.bg);});
      popup.appendChild(sw);
    });
    document.body.appendChild(popup);activeTblCpPopup=popup;
    const r=anchorEl.getBoundingClientRect();
    let left=r.left,top=r.top-140;
    if(left+134>window.innerWidth)left=window.innerWidth-138;
    if(top<4)top=r.bottom+4;
    popup.style.left=left+'px';popup.style.top=top+'px';
  }

  const colorBtn=el.querySelector('.tbl-color-btn');
  if(colorBtn){
    colorBtn.addEventListener('mousedown',e=>e.stopPropagation());
    colorBtn.addEventListener('click',e=>{e.stopPropagation();showTblCpPopup(colorBtn);});
  }

  // Title rename dblclick
  const tblName=el.querySelector('.tbl-name');
  el.querySelector('.tbl-header').addEventListener('dblclick',e=>{
    if(e.target===tblName||e.target.classList.contains('tbl-btn'))return;
    tblName.removeAttribute('readonly');tblName.removeAttribute('tabindex');
    tblName.classList.add('editing');tblName.focus();tblName.select();
  });
  tblName.addEventListener('blur',()=>{tblName.setAttribute('readonly','');tblName.setAttribute('tabindex','-1');tblName.classList.remove('editing');sched();});
  tblName.addEventListener('keydown',e=>{e.stopPropagation();if(e.key==='Enter')tblName.blur();});

  // Drag
  mkDrag(el,el.querySelector('.tbl-header'));
  mkResizeRight(el,el.querySelector('.tbl-rrsz'));
  // Resize corner
  mkResize(el,el.querySelector('.tbl-box-resize'));

  mkGroupDrag(el);
  ci.appendChild(el);
  return el;
}

  // contenteditable
  const body=fnBubbleTarget?.querySelector('.fn-body,.nbody');

  body.focus();
  const sel=window.getSelection();
  if(sel&&sel.toString().length>0){
    document.execCommand('fontName',false,font);
    document.querySelectorAll('font[face]').forEach(el=>{
      el.style.fontFamily=el.getAttribute('face');el.removeAttribute('face');
    });
  } else {
    const span=document.createElement('span');
    span.style.fontFamily=font;
    span.appendChild(document.createTextNode('\u200B'));
    if(sel&&sel.rangeCount){
      const range=sel.getRangeAt(0);
      range.insertNode(span);
      range.setStart(span.firstChild,1);
      range.collapse(true);
      sel.removeAllRanges();sel.addRange(range);
    }
  }
  sched();
});

function mkFreeNote(opts={}){
  const id=opts.id||String(gId());
  const el=document.createElement('div');
  el.className='free-note';
  el.dataset.id=id;
  el.dataset.bg=opts.bg||'transparent';
  el.style.left=(opts.x||100)+'px';
  el.style.top=(opts.y||100)+'px';
  el.style.width=(opts.w||240)+'px';
  el.style.height=(opts.h||96)+'px';
  el.style.background=opts.bg||'transparent';
  if(opts.border==='1')el.style.outline='1.5px solid #b0a898';
  el.dataset.border=opts.border||'0';
  el.style.zIndex=nZ();
  const fnFont=opts.font||$('ffam')?.value||"'Inter',sans-serif";

  // Build 8 directional resize handles + corner
  const dirs=['n','s','e','w','nw','ne','sw','se'];
  const dirHtml=dirs.map(d=>`<div class="fn-dir dr-${d}" data-dir="${d}"></div>`).join('');

  el.innerHTML=`
    ${dirHtml}
    <div class="fn-body" contenteditable="false" spellcheck="true" style="font-family:${fnFont}">${opts.html||''}</div>
    <button class="fn-color-btn" title="Background color"><span class="fn-color-dot" style="background:${opts.bg||'transparent'}"></span>Color</button>
    <button class="fn-del-btn" title="Delete note">✕</button>
    <div class="fn-rrsz"></div>
    <div class="fn-rsz">◢</div>`;

  const body=el.querySelector('.fn-body');
  const colorBtn=el.querySelector('.fn-color-btn');
  const delBtn=el.querySelector('.fn-del-btn');
  delBtn.addEventListener('click',e=>{
    e.stopPropagation();
    inlineConfirm(el,'Delete this note?',()=>{el.remove();hideFnBubble();sched();});
  });
  delBtn.addEventListener('mousedown',e=>e.stopPropagation());

  let fnSelected=false;

  function selectNote(){
    // Deselect any other note
    document.querySelectorAll('.free-note.fn-selected').forEach(n=>{if(n!==el)n.classList.remove('fn-selected');});
    el.classList.add('fn-selected');
    fnSelected=true;
    el.style.zIndex=nZ();
  }
  function deselectNote(){
    el.classList.remove('fn-selected');
    fnSelected=false;
  }
  function deleteFreeNote(){
    inlineConfirm(el,'Delete this note?',()=>{el.remove();hideFnBubble();sched();});
  }
  function enterEdit(){
    deselectNote();
    el.classList.add('fn-editing');
    body.contentEditable='true';
    el.style.cursor='default';
    body.style.cursor='text';
    el.style.zIndex=nZ();
    // keep fixed height in edit mode
    setTimeout(()=>{body.focus();showFnBubble(el);},50);
  }
  function exitEdit(){
    // Remove if empty (no text and no images)
    if(!body.textContent.trim()&&!body.querySelector('img')){
      el.remove();hideFnBubble();sched();return;
    }
    // height stays fixed
    el.classList.remove('fn-editing');
    body.contentEditable='false';
    el.style.cursor='grab';
    body.style.cursor='inherit';
    closeFnColorPopup();
    hideFnBubble();
    sched();
  }

  // Single click → select, double-click → edit
  el.addEventListener('click',e=>{
    if(el.classList.contains('fn-editing'))return;
    e.stopPropagation();
    selectNote();
  });
  el.addEventListener('dblclick',e=>{
    e.stopPropagation();
    enterEdit();
  });

  // Click anywhere on note container focuses body in edit mode
  el.addEventListener('mousedown',e=>{
    if(!el.classList.contains('fn-editing'))return;
    if(e.target===body||body.contains(e.target))return; // already on body
    if(e.target.classList.contains('fn-rsz')||e.target.classList.contains('fn-rrsz'))return;
    if(e.target.classList.contains('fn-dir'))return;
    if(e.target.classList.contains('fn-del-btn')||e.target.classList.contains('fn-color-btn'))return;
    e.preventDefault(); // prevent blur
    body.focus();
  });

  // Escape exits
  body.addEventListener('keydown',e=>{
    e.stopPropagation();
    if(e.key==='Enter'){
      const result=tryMathLine();
      if(result!==null){
        e.preventDefault();
        document.execCommand('insertText',false,result);
        requestAnimationFrame(()=>{document.execCommand('insertParagraph',false,null);sched();});
      }
    }
  });

  // Image paste
  body.addEventListener('input',sched);
  body.addEventListener('focus',()=>{showFnBubble(el);});

  // Click outside exits edit mode - only stay if focus went to the bubble or color popup
  body.addEventListener('blur',()=>{
    setTimeout(()=>{
      if(!el.classList.contains('fn-editing'))return;
      if(suppressBlur)return; // dragging — don't exit edit
      if(fnBubble&&fnBubble.contains(document.activeElement))return;
      if(fnColorPopupOpen)return; // color popup is open, don't exit
      exitEdit();
    },150);
  });

  // Drag — always allowed except on resize handles and when clicking text in edit mode
  let dsx,dsy,dsl,dst,isDragging=false,suppressBlur=false;
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('fn-rsz')||e.target.classList.contains('fn-rrsz'))return;
    if(e.target.classList.contains('fn-dir'))return;
    if(e.target.classList.contains('fn-del-btn')||e.target.classList.contains('fn-color-btn'))return;
    // In edit mode — only drag if clicking empty space (el itself), not the body text
    if(el.classList.contains('fn-editing')&&e.target!==el)return;
    e.preventDefault();e.stopPropagation();
    isDragging=true;suppressBlur=true;dsx=e.clientX;dsy=e.clientY;
    dsl=parseInt(el.style.left)||0;dst=parseInt(el.style.top)||0;
    el.style.zIndex=nZ();
    // Disable contentEditable and text selection during drag
    if(el.classList.contains('fn-editing'))body.contentEditable='false';
    document.body.style.userSelect='none';
    document.body.style.webkitUserSelect='none';
    document.addEventListener('mousemove',onFnMove);
    document.addEventListener('mouseup',onFnUp);
  });
  function onFnMove(e){
    if(!isDragging)return;
    if(e.buttons===0){
      document.removeEventListener('mousemove',onFnMove);
      document.removeEventListener('mouseup',onFnUp);
      document.body.style.userSelect='';
      document.body.style.webkitUserSelect='';
      const wasEditing=el.classList.contains('fn-editing');
      if(wasEditing)body.contentEditable='true';
      suppressCanvasClick=true;
      // Keep suppressBlur=true until blur timeout passes, then restore state
      setTimeout(()=>{
        isDragging=false;suppressBlur=false;
        suppressCanvasClick=false;
        if(wasEditing){body.focus();showFnBubble(el);}
        else{el.classList.add('fn-selected');}
      },200);
      sched();
      return;
    }
    el.style.left=Math.max(0,dsl+(e.clientX-dsx)/zoom)+'px';
    el.style.top=Math.max(0,dst+(e.clientY-dsy)/zoom)+'px';
    if(fnBubbleTarget===el)repositionFnBubble();
  }
  function onFnUp(){
    if(!isDragging)return;
    document.removeEventListener('mousemove',onFnMove);
    document.removeEventListener('mouseup',onFnUp);
    document.body.style.userSelect='';
    document.body.style.webkitUserSelect='';
    if(el.classList.contains('fn-editing'))body.contentEditable='true';
    sched();
    if(el.classList.contains('fn-editing')){
      suppressCanvasClick=true;
      setTimeout(()=>{
        isDragging=false;suppressBlur=false;
        suppressCanvasClick=false;
        if(el.classList.contains('fn-editing')){body.focus();showFnBubble(el);}
      },200);
    } else {
      isDragging=false;suppressBlur=false;
    }
  }

  // 8-direction resize (only in edit mode)
  (function(){
    const dirMap={
      'n':{ns:-1,ew:0,ny:true},'s':{ns:1,ew:0,ny:false},
      'w':{ns:0,ew:-1,nx:true},'e':{ns:0,ew:1,nx:false},
      'nw':{ns:-1,ew:-1,ny:true,nx:true},'ne':{ns:-1,ew:1,ny:true,nx:false},
      'sw':{ns:1,ew:-1,ny:false,nx:true},'se':{ns:1,ew:1,ny:false,nx:false},
    };
    let sx,sy,sw,sh,sl,st2,dir,rOn=false;
    el.querySelectorAll('.fn-dir').forEach(hdl=>{
      const d=dirMap[hdl.dataset.dir];
      hdl.addEventListener('mousedown',e=>{
        e.preventDefault();e.stopPropagation();
        if(el.classList.contains('fn-editing')){setTimeout(()=>{if(el.classList.contains('fn-editing')){suppressCanvasClick=true;body.focus();showFnBubble(el);setTimeout(()=>{suppressCanvasClick=false;},100);}},300);}
        rOn=true;dir=d;sx=e.clientX;sy=e.clientY;
        document.addEventListener('mousemove',on8DirMove);
        document.addEventListener('mouseup',on8DirUp);
        sw=el.offsetWidth;sh=el.offsetHeight;
        sl=parseInt(el.style.left)||0;st2=parseInt(el.style.top)||0;
      });
    });
    function on8DirMove(e){
      if(!rOn)return;
      const dx=(e.clientX-sx)/zoom,dy=(e.clientY-sy)/zoom;
      if(dir.ew!==0){const nw=Math.max(48,sw+dir.ew*dx);el.style.width=nw+'px';if(dir.nx)el.style.left=(sl+sw-nw)+'px';}
      if(dir.ns!==0){const nh=Math.max(24,sh+dir.ns*dy);el.style.height=nh+'px';if(dir.ny)el.style.top=(st2+sh-nh)+'px';}
    }
    function on8DirUp(){
      if(!rOn)return;
      rOn=false;
      document.removeEventListener('mousemove',on8DirMove);
      document.removeEventListener('mouseup',on8DirUp);
      sched();
    }
  })();

  // Corner resize
  // Prevent blur when clicking resize handles in edit mode
  el.querySelector('.fn-rsz').addEventListener('mousedown',e=>{e.stopPropagation();if(el.classList.contains('fn-editing')){setTimeout(()=>{if(el.classList.contains('fn-editing')){suppressCanvasClick=true;body.focus();showFnBubble(el);setTimeout(()=>{suppressCanvasClick=false;},100);}},300);}});
  el.querySelector('.fn-rrsz').addEventListener('mousedown',e=>{e.stopPropagation();if(el.classList.contains('fn-editing')){setTimeout(()=>{if(el.classList.contains('fn-editing')){suppressCanvasClick=true;body.focus();showFnBubble(el);setTimeout(()=>{suppressCanvasClick=false;},100);}},300);}});
  mkResize(el,el.querySelector('.fn-rsz'));
  // Right edge resize
  mkResizeRight(el,el.querySelector('.fn-rrsz'));

  // Color picker
  function showFnColorPopup(){
    closeFnColorPopup();
    fnColorPopupOpen=true;
    const popup=document.createElement('div');
    popup.style.cssText='position:fixed;background:#fff;border:1px solid #e0dbd2;border-radius:8px;padding:6px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.12);display:flex;gap:5px;flex-wrap:wrap;width:130px';
    popup.addEventListener('click',e=>e.stopPropagation());
    popup.addEventListener('mousedown',e=>e.stopPropagation());
    FN_COLORS.forEach(col=>{
      const sw=document.createElement('div');
      sw.style.cssText=`width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid ${(el.dataset.bg||'transparent')===col.bg?'#555':'transparent'};background:${col.bg==='transparent'?'linear-gradient(135deg,#fff 45%,#f00 45%,#f00 55%,#fff 55%)':'none'};background-color:${col.bg!=='transparent'?col.bg:'transparent'}`;
      sw.title=col.label;
      sw.addEventListener('mousedown',e2=>{e2.stopPropagation();e2.preventDefault();});
      sw.addEventListener('click',e2=>{
        e2.stopPropagation();
        el.dataset.bg=col.bg;
        el.style.background=col.bg==='transparent'?'transparent':col.bg;
        const dot=el.querySelector('.fn-color-dot');
        if(dot)dot.style.background=col.bg==='transparent'?'linear-gradient(135deg,#fff 45%,#f00 45%,#f00 55%,#fff 55%)':col.bg;
        // Update bubble bg dot
        const bubbleDot=document.getElementById('fn-bubble-bg-dot');
        if(bubbleDot){
          if(col.bg==='transparent'){bubbleDot.style.background='linear-gradient(135deg,#fff 45%,#f00 45%,#f00 55%,#fff 55%)';bubbleDot.style.border='1.5px solid rgba(255,255,255,.4)';}
          else{bubbleDot.style.background=col.bg;bubbleDot.style.border='1.5px solid rgba(255,255,255,.3)';}
        }
        closeFnColorPopup();
        sched();
      });
      popup.appendChild(sw);
    });
    document.body.appendChild(popup);
    activeFnColorPopup=popup;
    const r=colorBtn.getBoundingClientRect();
    popup.style.left=r.left+'px';
    popup.style.top=(r.bottom+4)+'px';
  }
  colorBtn.addEventListener('mousedown',e=>e.stopPropagation());
  colorBtn.addEventListener('click',e=>{e.stopPropagation();showFnColorPopup();});

  mkGroupDrag(el);
  ci.appendChild(el);

  if(opts.editOnCreate){
    setTimeout(enterEdit,30);
  }
  return el;
}

let canvasSel=new Set(); // selected element ids
let rbStart=null; // rubber-band start {x,y} in canvas coords
const rb=$('rubber-band');
const selBadge=$('sel-badge');
const selCount=$('sel-count');

function clearCanvasSel(){
  canvasSel.clear();
  ci.querySelectorAll('.canvas-selected').forEach(e=>e.classList.remove('canvas-selected'));
  selBadgeConfirmMode(false);
  updateSelBadge();
}

function updateSelBadge(){
  const n=canvasSel.size;
  if(n===0){selBadge.classList.remove('vis');return;}
  selCount.textContent=n+' selected';
  selBadge.classList.add('vis');

function selBadgeConfirmMode(on){
  document.getElementById('sel-badge-del').style.display=on?'none':'';
  document.getElementById('sel-badge-confirm').style.display=on?'flex':'none';
}
document.getElementById('sel-badge-del').addEventListener('click',()=>{

});
document.getElementById('sel-badge-yes').addEventListener('click',()=>{

    const el=ci.querySelector(`[data-id="${id}"]`);
    if(el)el.remove();
  });

// Rubber-band mousedown on canvas (Shift key)
canvas.addEventListener('mousedown',e=>{
  if(!e.shiftKey)return;
  if(e.target!==canvas&&e.target!==ci)return;
  e.preventDefault();e.stopPropagation();
  clearCanvasSel();
  const cr=canvas.getBoundingClientRect();
  rbStart={
    x:(e.clientX-cr.left+canvas.scrollLeft)/zoom,
    y:(e.clientY-cr.top+canvas.scrollTop)/zoom,
    cx:e.clientX,cy:e.clientY
  };
  rb.style.display='block';
  rb.style.left=rbStart.x+'px';rb.style.top=rbStart.y+'px';
  rb.style.width='0';rb.style.height='0';
},true);

document.addEventListener('mousemove',e=>{
  if(!rbStart)return;
  const cr=canvas.getBoundingClientRect();
  const cx=(e.clientX-cr.left+canvas.scrollLeft)/zoom;
  const cy=(e.clientY-cr.top+canvas.scrollTop)/zoom;
  const rx=Math.min(rbStart.x,cx),ry=Math.min(rbStart.y,cy);
  const rw=Math.abs(cx-rbStart.x),rh=Math.abs(cy-rbStart.y);
  rb.style.left=rx+'px';rb.style.top=ry+'px';
  rb.style.width=rw+'px';rb.style.height=rh+'px';
});

document.addEventListener('mouseup',e=>{
  if(!rbStart)return;
  const cr=canvas.getBoundingClientRect();
  const cx=(e.clientX-cr.left+canvas.scrollLeft)/zoom;
  const cy=(e.clientY-cr.top+canvas.scrollTop)/zoom;
  const rx=Math.min(rbStart.x,cx),ry=Math.min(rbStart.y,cy);
  const rw=Math.abs(cx-rbStart.x),rh=Math.abs(cy-rbStart.y);
  rb.style.display='none';
  rbStart=null;
  if(rw<5&&rh<5)return; // too small - ignore
  // Check all canvas elements
  ci.querySelectorAll('.free-note,.draw-box,.tbl-box,.code-node,.attach-card').forEach(el=>{
    const ex=parseInt(el.style.left)||0,ey=parseInt(el.style.top)||0;
    const ew=el.offsetWidth,eh=el.offsetHeight;
    // Check if element overlaps with rubber-band rect
    if(ex<rx+rw&&ex+ew>rx&&ey<ry+rh&&ey+eh>ry){
      el.classList.add('canvas-selected');
      canvasSel.add(el.dataset.id);
    }
  });
  updateSelBadge();
});

// Clear selection on plain click on canvas
canvas.addEventListener('click',e=>{
  if(e.shiftKey)return;
  if(!e.target.closest('.free-note,.draw-box,.tbl-box'))clearCanvasSel();
});



// Group drag - when dragging a selected element, move all selected
function mkGroupDrag(el){
  el.addEventListener('mousedown',e=>{
    if(!canvasSel.has(el.dataset.id)||canvasSel.size<2)return;
    if(el.classList.contains('fn-editing'))return;
    e.stopPropagation();e.preventDefault();
    const startX=e.clientX,startY=e.clientY;
    const positions=new Map();
    canvasSel.forEach(id=>{
      const elem=ci.querySelector(`[data-id="${id}"]`);
      if(elem)positions.set(id,{x:parseInt(elem.style.left)||0,y:parseInt(elem.style.top)||0});
    });
    function onMove(ev){
      const dx=(ev.clientX-startX)/zoom,dy=(ev.clientY-startY)/zoom;
      canvasSel.forEach(id=>{
        const elem=ci.querySelector(`[data-id="${id}"]`);
        if(!elem)return;
        const pos=positions.get(id);
        elem.style.left=Math.max(0,pos.x+dx)+'px';
        elem.style.top=Math.max(0,pos.y+dy)+'px';
      });
    }
    function onUp(){document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);sched();}
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}

// ── INLINE CONFIRM ───────────────────────────────────────
function inlineConfirm(anchorEl, msg, onConfirm){
  const existing=document.getElementById('inline-confirm-popup');
  if(existing)existing.remove();
  const popup=document.createElement('div');
  popup.id='inline-confirm-popup';
  popup.style.cssText='position:fixed;background:#1a1714;color:#fff;border-radius:8px;padding:6px 10px;z-index:99999;display:flex;align-items:center;gap:8px;font-family:Syne,sans-serif;font-size:11px;box-shadow:0 4px 16px rgba(0,0,0,.3)';
  const lbl=document.createElement('span');lbl.textContent=msg;lbl.style.opacity='.8';
  const yes=document.createElement('button');
  yes.textContent='Delete';
  yes.style.cssText='background:#e05a5a;border:none;color:#fff;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px;font-family:Syne,sans-serif';
  const no=document.createElement('button');
  no.textContent='Cancel';
  no.style.cssText='background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px;font-family:Syne,sans-serif';
  popup.appendChild(lbl);popup.appendChild(yes);popup.appendChild(no);
  popup.addEventListener('click',e=>e.stopPropagation());
  popup.addEventListener('mousedown',e=>e.stopPropagation());
  document.body.appendChild(popup);
  // Position near anchor — prefer just above, centered
  const r=anchorEl.getBoundingClientRect();
  const pw=220;
  let left=r.left+r.width/2-pw/2;
  let top=r.top-44;
  if(top<8)top=r.bottom+8;
  if(left<8)left=8;
  if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
  popup.style.left=left+'px';popup.style.top=top+'px';
  const close=()=>{popup.remove();document.removeEventListener('keydown',onKey);};
  const confirm=()=>{close();onConfirm();};
  yes.addEventListener('click',confirm);
  no.addEventListener('click',close);
  // Enter = confirm, Escape = cancel
  function onKey(e){
    if(e.key==='Enter'){e.stopPropagation();e.preventDefault();confirm();}
  }
  document.addEventListener('keydown',onKey);
  // Close on outside click (not inside popup)
  setTimeout(()=>document.addEventListener('click',e=>{
    if(!popup.contains(e.target))close();
  },{once:true}),50);
}

// ── FILE ATTACHMENT ENGINE ───────────────────────────────
function fileIcon(name){
  const ext=(name.split('.').pop()||'').toLowerCase();
  if(['jpg','jpeg','png','gif','webp','svg','bmp'].includes(ext))return'🖼';
  if(['pdf'].includes(ext))return'📄';
  if(['doc','docx'].includes(ext))return'📝';
  if(['xls','xlsx','csv'].includes(ext))return'📊';
  if(['ppt','pptx'].includes(ext))return'📑';
  if(['zip','rar','7z','tar','gz'].includes(ext))return'🗜';
  if(['mp3','wav','ogg','flac'].includes(ext))return'🎵';
  if(['mp4','mov','avi','mkv'].includes(ext))return'🎬';
  if(['txt','md','json','xml','html','css','js'].includes(ext))return'📃';
  return'📎';
}
function fmtSize(bytes){
  if(bytes<1024)return bytes+'B';
  if(bytes<1024*1024)return(bytes/1024).toFixed(1)+'KB';
  return(bytes/1024/1024).toFixed(1)+'MB';
}

function mkAttachCard(opts={}){
  const id=opts.id||String(gId());
  const el=document.createElement('div');
  el.className='attach-card';
  el.dataset.id=id;
  el.dataset.name=opts.name||'file';
  el.dataset.size=opts.size||'0';
  el.dataset.filedata=opts.data||'';
  el.dataset.mime=opts.mime||'application/octet-stream';
  el.style.left=(opts.x||100)+'px';
  el.style.top=(opts.y||100)+'px';
  el.style.zIndex=nZ();

  el.innerHTML=`
    <span class="attach-icon">${fileIcon(opts.name||'')}</span>
    <div class="attach-info">
      <div class="attach-name" title="${esc(opts.name||'')}">${esc(opts.name||'file')}</div>
      <div class="attach-size">${fmtSize(parseInt(opts.size||0))}</div>
    </div>
    <button class="attach-dl" title="Download">↓</button>
    <button class="attach-del" title="Remove">✕</button>`;

  el.querySelector('.attach-dl').addEventListener('click',e=>{
    e.stopPropagation();
    const a=document.createElement('a');
    a.href='data:'+el.dataset.mime+';base64,'+el.dataset.filedata;
    a.download=el.dataset.name;
    a.click();
  });
  el.querySelector('.attach-del').addEventListener('click',e=>{
    e.stopPropagation();
    inlineConfirm(el,'Remove attachment?',()=>{el.remove();sched();});
  });

  // Drag to move
  let sx,sy,sl,st2,on=false;
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('attach-dl')||e.target.classList.contains('attach-del'))return;
    e.preventDefault();e.stopPropagation();
    on=true;sx=e.clientX;sy=e.clientY;
    sl=parseInt(el.style.left)||0;st2=parseInt(el.style.top)||0;
    el.style.zIndex=nZ();
  });
  document.addEventListener('mousemove',e=>{if(!on)return;el.style.left=Math.max(0,sl+(e.clientX-sx)/zoom)+'px';el.style.top=Math.max(0,st2+(e.clientY-sy)/zoom)+'px';});
  document.addEventListener('mouseup',()=>{if(on){on=false;sched();}});

  mkGroupDrag(el);
  ci.appendChild(el);
  return el;
}

// Drag & drop files onto canvas
const dropOverlay=document.getElementById('canvas-drop-overlay');
canvas.addEventListener('dragenter',e=>{
  if(!e.dataTransfer.types.includes('Files'))return;
  e.preventDefault();
  dropOverlay.classList.add('vis');
});
canvas.addEventListener('dragover',e=>{
  if(!e.dataTransfer.types.includes('Files'))return;
  e.preventDefault();
  e.dataTransfer.dropEffect='copy';
});
canvas.addEventListener('dragleave',e=>{
  if(!canvas.contains(e.relatedTarget))dropOverlay.classList.remove('vis');
});
canvas.addEventListener('drop',e=>{
  e.preventDefault();
  dropOverlay.classList.remove('vis');
  const cr=canvas.getBoundingClientRect();
  const files=[...e.dataTransfer.files];
  files.forEach((file,i)=>{
    const x=(e.clientX-cr.left+canvas.scrollLeft)/zoom + i*20;
    const y=(e.clientY-cr.top+canvas.scrollTop)/zoom + i*20;
    const reader=new FileReader();
    reader.onload=ev=>{
      const base64=ev.target.result.split(',')[1];
      mkAttachCard({x:Math.max(0,x),y:Math.max(0,y),name:file.name,size:file.size,data:base64,mime:file.type||'application/octet-stream'});
      sched();
    };
    reader.readAsDataURL(file);
  });
});

// ── PYODIDE ENGINE ───────────────────────────────────────
let pyodideReady=false;
let pyodideLoading=false;
let pyodideInstance=null;

async function loadPyodideOnce(){
  if(pyodideReady)return pyodideInstance;
  if(pyodideLoading)return null;
  pyodideLoading=true;
  try{
    pyodideInstance=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/'});
    pyodideReady=true;
    return pyodideInstance;
  }catch(e){
    pyodideLoading=false;
    throw e;
  }
}

async function runPython(code, outputEl){
  const codeNode=outputEl.closest('.code-node');
  const runBtn=codeNode.querySelector('.code-run-btn');
  const resizerEl=outputEl.previousElementSibling;
  const wasHidden=outputEl.style.display==='none'||!outputEl.style.display;
  runBtn.textContent='Loading...';
  runBtn.classList.add('loading');
  outputEl.style.display='block';
  if(resizerEl&&resizerEl.classList.contains('code-output-resizer'))resizerEl.style.display='block';

  try{
    const py=await loadPyodideOnce();
    runBtn.textContent='Running...';
    let stdout='',stderr='';
    py.setStdout({batched:function(s){stdout+=s+'\n';}});
    py.setStderr({batched:function(s){stderr+=s+'\n';}});
    let result;
    try{result=await py.runPythonAsync(code);}
    catch(err){stderr+=err.message;}
    const noneVal=py.globals.get('None');
    const hasResult=result!==undefined&&result!==null&&result!==noneVal;
    const outText=(stdout+(hasResult?String(result)+'\n':'')+(stderr?stderr:'')).trim();
    const cls=stderr?'code-out-error':'code-out-current';
    outputEl.innerHTML='<div class="'+cls+'">'+esc(outText||'(no output)')+'</div>';
  }catch(e){
    outputEl.innerHTML='<div class="code-out-error">Failed to load Python: '+esc(e.message)+'</div>';
  }
  runBtn.textContent='Run';
  runBtn.classList.remove('loading');
}


let sqlDb=null;
let sqlJsReady=false;

async function loadSqlJs(){
  if(sqlJsReady)return sqlDb;
  const SQL=await initSqlJs({
    locateFile:f=>'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/'+f
  });
  sqlDb=new SQL.Database();
  sqlJsReady=true;
  return sqlDb;
}

function renderSqlTable(results){
  if(!results||results.length===0)return '<div class="code-out-current">(no results)</div>';
  let html='';
  results.forEach(function(result){
    const cols=result.columns;
    const rows=result.values;
    html+='<table class="code-sql-table"><thead><tr>'+cols.map(function(c){return '<th>'+esc(String(c))+'</th>';}).join('')+'</tr></thead>';
    html+='<tbody>'+rows.map(function(row){return '<tr>'+row.map(function(cell){return '<td>'+esc(cell===null?'NULL':String(cell))+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';
    html+='<div class="code-sql-rowcount">'+rows.length+' row'+(rows.length!==1?'s':'')+'</div>';
  });
  return html;
}

async function runSQL(code, outputEl){
  const runBtn=outputEl.closest('.code-node').querySelector('.code-run-btn');
  runBtn.textContent='Loading...';
  runBtn.classList.add('loading');
  const wasHidden=outputEl.style.display==='none'||!outputEl.style.display;
  outputEl.style.display='block';
  const resizerEl=outputEl.previousElementSibling;if(resizerEl&&resizerEl.classList.contains('code-output-resizer'))resizerEl.style.display='block';
  // Expand node height to fit output if needed
  if(wasHidden){
    const codeNode=outputEl.closest('.code-node');
    if(codeNode&&codeNode.style.height){
      const currentH=parseInt(codeNode.style.height)||0;
      codeNode.style.height=(currentH+165)+'px';
    }
  }

  try{
    const db=await loadSqlJs();
    runBtn.textContent='Running...';
    let currentHtml='';
    try{
      const results=db.exec(code);
      if(results.length===0){currentHtml='<div class="code-out-current">OK</div>';}
      else{currentHtml=renderSqlTable(results);}
    }catch(e){currentHtml='<div class="code-out-error">'+esc(e.message)+'</div>';}
    outputEl.innerHTML=currentHtml;
  }catch(e){
    outputEl.innerHTML='<div class="code-out-error">Failed to load SQL engine: '+esc(e.message)+'</div>';
  }
  runBtn.textContent='▶ Run';
  runBtn.classList.remove('loading');
}

function mkMinesweeper(el, savedState){
  const content=el.querySelector('.game-content');
  const GRIDS={small:{cols:9,rows:9},medium:{cols:16,rows:16},large:{cols:30,rows:16}};
  const DIFF={easy:0.10,medium:0.16,hard:0.21};
  const CSIZES={normal:22,large:30};

  // ── Configuration ─────────────────────────────────────
  let cfg=savedState&&savedState.cfg?savedState.cfg:{grid:'small',diff:'easy',display:'normal'};
  let showCfg=false;

  // ── Game state ────────────────────────────────────────
  let board=[],gameState='idle',flagCount=0,timerVal=0,timerInt=null;

  // ── Widget state ──────────────────────────────────────
  // inactive_paused: node sitting on canvas, timer stopped
  // active:          node focused, timer running, interactive
  let widgetState='inactive_paused';

  // ── Board helpers ─────────────────────────────────────
  function initBoard(){
    const {cols,rows}=GRIDS[cfg.grid];
    board=[];
    for(let i=0;i<rows*cols;i++)board.push({mine:false,revealed:false,flagged:false,adj:0});
  }

  function placeMines(safeIdx){
    const {cols,rows}=GRIDS[cfg.grid];
    const total=cols*rows;
    const count=Math.floor(total*DIFF[cfg.diff]);
    let placed=0;
    while(placed<count){
      const idx=Math.floor(Math.random()*total);
      if(!board[idx].mine&&idx!==safeIdx){board[idx].mine=true;placed++;}
    }
    for(let r=0;r<rows;r++)for(let c2=0;c2<cols;c2++){
      if(board[r*cols+c2].mine)continue;
      let adj=0;
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        const nr=r+dr,nc=c2+dc;
        if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&board[nr*cols+nc].mine)adj++;
      }
      board[r*cols+c2].adj=adj;
    }
  }

  function reveal(idx){
    const {cols,rows}=GRIDS[cfg.grid];
    if(idx<0||idx>=cols*rows)return;
    const cell=board[idx];
    if(cell.revealed||cell.flagged)return;
    cell.revealed=true;
    if(cell.adj===0&&!cell.mine){
      const r=Math.floor(idx/cols),c2=idx%cols;
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        const nr=r+dr,nc=c2+dc;
        if(nr>=0&&nr<rows&&nc>=0&&nc<cols)reveal(nr*cols+nc);
      }
    }
  }

  function checkWin(){return board.every(c=>c.mine||c.revealed);}
  function lcdNum(n){return String(Math.max(0,Math.min(999,n))).padStart(3,'0');}

  // ── Timer ─────────────────────────────────────────────
  function startTimer(){
    if(timerInt)return;
    timerInt=setInterval(()=>{
      timerVal=Math.min(999,timerVal+1);
      const t=content.querySelector('.mine-timer');
      if(t)t.textContent=lcdNum(timerVal);
    },1000);
  }

  function stopTimer(){
    if(timerInt){clearInterval(timerInt);timerInt=null;}
  }

  // ── Widget state transitions ──────────────────────────
  function activate(){
    widgetState='active';
    el.classList.add('minesweeper-active');
    el.style.zIndex=nZWidget();
    // Deactivate other game nodes
    ci.querySelectorAll('.minesweeper-node.minesweeper-active').forEach(g=>{
      if(g!==el){g.classList.remove('minesweeper-active');g.dispatchEvent(new CustomEvent('minesweeper-deactivate'));}
    });
    // Resume timer if game was in progress
    if(gameState==='playing')startTimer();
  }

  function deactivate(){
    widgetState='inactive_paused';
    el.classList.remove('minesweeper-active');
    stopTimer();
  }

  // Listen for cross-closure events from mkMinesweeperNode
  el.addEventListener('minesweeper-activate',activate);
  el.addEventListener('minesweeper-deactivate',deactivate);

  // ── Game actions ──────────────────────────────────────
  function onCellClick(idx){
    activate();
    if(gameState==='won'||gameState==='lost')return;
    const cell=board[idx];
    if(cell.flagged||cell.revealed)return;
    if(gameState==='idle'){
      gameState='playing';
      placeMines(idx);
      startTimer();
    }
    if(cell.mine){cell.revealed=true;gameState='lost';stopTimer();render();return;}
    reveal(idx);
    if(checkWin()){gameState='won';stopTimer();}
    render();saveGameState();
  }

  function onCellRight(idx){
    if(gameState==='won'||gameState==='lost')return;
    const cell=board[idx];
    if(cell.revealed)return;
    cell.flagged=!cell.flagged;
    flagCount+=cell.flagged?1:-1;
    render();saveGameState();
  }

  function newGame(){
    stopTimer();timerVal=0;flagCount=0;gameState='idle';
    initBoard();render();el.dataset.state='';sched();
  }

  function saveGameState(){
    el.dataset.state=JSON.stringify({cfg,board:board.map(c=>({...c})),gameState,flagCount,timerVal});
    sched();
  }

  // ── Render ────────────────────────────────────────────
  function render(){
    const {cols,rows}=GRIDS[cfg.grid];
    const total=cols*rows;
    const mineCount=Math.floor(total*DIFF[cfg.diff]);
    const cs=CSIZES[cfg.display];
    const face=gameState==='won'?'😎':gameState==='lost'?'😵':'🙂';

    let html='<div class="mine-toolbar">'+
      '<div class="mine-lcd">'+lcdNum(mineCount-flagCount)+'</div>'+
      '<button class="mine-face">'+face+'</button>'+
      '<div class="mine-lcd mine-timer">'+lcdNum(timerVal)+'</div>'+
      '</div><div class="mine-body">'+
      '<div class="mine-grid" style="grid-template-columns:repeat('+cols+','+cs+'px)">';

    for(let i=0;i<total;i++){
      const cell=board[i];
      const sz='width:'+cs+'px;height:'+cs+'px';
      if(cell.revealed){
        if(cell.mine) html+='<div class="mine-cell mine-hit" style="'+sz+'">💥</div>';
        else{const n=cell.adj;html+='<div class="mine-cell revealed'+(n>0?' mine-n'+n:'')+'" style="'+sz+'">'+(n||'')+'</div>';}
      } else if(cell.flagged){
        html+='<div class="mine-cell flagged" data-i="'+i+'" style="'+sz+'">🚩</div>';
      } else if(gameState==='lost'&&cell.mine){
        html+='<div class="mine-cell mine-show" style="'+sz+'">💣</div>';
      } else {
        html+='<div class="mine-cell covered" data-i="'+i+'" style="'+sz+'"></div>';
      }
    }
    html+='</div></div>';

    if(showCfg){
      html+='<div class="mine-cfg">'+
        '<div class="mine-cfg-label">GRID SIZE</div>'+
        '<div class="mine-cfg-row">'+
        ['small','medium','large'].map(g=>'<button class="mine-cfg-btn'+(cfg.grid===g?' active':'')+'" data-grid="'+g+'">'+(g==='small'?'9×9':g==='medium'?'16×16':'30×16')+'</button>').join('')+
        '</div><div class="mine-cfg-label">DIFFICULTY</div>'+
        '<div class="mine-cfg-row">'+
        ['easy','medium','hard'].map(d=>'<button class="mine-cfg-btn'+(cfg.diff===d?' active':'')+'" data-diff="'+d+'">'+(d.charAt(0).toUpperCase()+d.slice(1))+'</button>').join('')+
        '</div><div class="mine-cfg-label">CELL SIZE</div>'+
        '<div class="mine-cfg-row">'+
        '<button class="mine-cfg-btn'+(cfg.display==='normal'?' active':'')+'" data-disp="normal">Normal</button>'+
        '<button class="mine-cfg-btn'+(cfg.display==='large'?' active':'')+'" data-disp="large">Large</button>'+
        '</div><button class="mine-apply-btn" id="mine-apply">▶ Apply &amp; New Game</button></div>';
    }

    content.innerHTML=html;

    // Settings button in header (persists across renders)
    const hdr=el.querySelector('.minesweeper-node-header');
    if(!hdr.querySelector('.mine-settings-btn')){
      const sb=document.createElement('button');
      sb.className='mine-settings-btn';sb.textContent='⚙';sb.title='Settings';
      hdr.insertBefore(sb,hdr.querySelector('.minesweeper-node-del'));
      sb.addEventListener('mousedown',e=>e.stopPropagation());
      sb.addEventListener('click',e=>{e.stopPropagation();showCfg=!showCfg;render();});
    }

    // Wire cells
    content.querySelectorAll('.mine-cell.covered').forEach(div=>{
      const idx=parseInt(div.dataset.i);
      div.addEventListener('click',e=>{e.stopPropagation();onCellClick(idx);});
      div.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();onCellRight(idx);});
    });
    content.querySelectorAll('.mine-cell.flagged').forEach(div=>{
      const idx=parseInt(div.dataset.i);
      div.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();onCellRight(idx);});
    });
    content.querySelector('.mine-face').addEventListener('click',e=>{e.stopPropagation();newGame();});

    // Click anywhere on content → activate
    content.addEventListener('click',e=>{e.stopPropagation();activate();});
    content.addEventListener('mousedown',e=>e.stopPropagation());

    if(showCfg){
      content.querySelectorAll('[data-grid]').forEach(b=>b.addEventListener('click',()=>{cfg.grid=b.dataset.grid;render();}));
      content.querySelectorAll('[data-diff]').forEach(b=>b.addEventListener('click',()=>{cfg.diff=b.dataset.diff;render();}));
      content.querySelectorAll('[data-disp]').forEach(b=>b.addEventListener('click',()=>{cfg.display=b.dataset.disp;render();}));
      const applyBtn=content.querySelector('#mine-apply');
      if(applyBtn)applyBtn.addEventListener('click',e=>{e.stopPropagation();showCfg=false;newGame();});
    }

    // Size node to fit grid
    el.style.width=(GRIDS[cfg.grid].cols*CSIZES[cfg.display]+20)+'px';
  }

  // ── Init ──────────────────────────────────────────────
  if(savedState&&savedState.board){
    board=savedState.board;
    gameState=savedState.gameState||'idle';
    flagCount=savedState.flagCount||0;
    timerVal=savedState.timerVal||0;
    // Restored in inactive_paused — timer restarts when activated
  } else {
    initBoard();
  }
  render();
}


// ── TIMER WIDGET ─────────────────────────────────────────
function mkTimerNode(opts={}){
  const id=opts.id||String(gId());
  const el=document.createElement('div');
  el.className='timer-node';
  el.dataset.id=id;
  el.dataset.widgetType='timer';
  el.dataset.nodeGroup='widget';
  el.style.left=(opts.x||100)+'px';
  el.style.top=(opts.y||100)+'px';
  if(opts.w)el.style.width=opts.w+'px';
  if(opts.h)el.style.height=opts.h+'px';
  el.style.zIndex=nZWidget();

  el.innerHTML=`
    <div class="timer-header">
      <span class="timer-header-title">TIMER</span>
      <button class="timer-header-btn timer-settings-toggle" title="Settings">⚙</button>
      <button class="timer-header-btn timer-del" title="Remove">✕</button>
    </div>
    <div class="timer-body">
      <div class="timer-label"><span>MIN</span><span>SEC</span></div>
      <div class="timer-display">15:00</div>
      <div class="timer-controls">
        <button class="timer-btn" id="tbtn-play">▶</button>
        <button class="timer-btn" id="tbtn-pause">⏸</button>
        <button class="timer-btn" id="tbtn-reset">■</button>
      </div>
    </div>
    <div class="timer-settings" style="display:none">
      <div class="timer-settings-label">PRESETS</div>
      <div class="timer-presets">
        <button class="timer-preset" data-min="5" data-sec="0">5 min</button>
        <button class="timer-preset" data-min="10" data-sec="0">10 min</button>
        <button class="timer-preset" data-min="15" data-sec="0">15 min</button>
        <button class="timer-preset" data-min="25" data-sec="0">25 min</button>
      </div>
      <div class="timer-settings-label">CUSTOM</div>
      <div class="timer-input-row">
        <input class="timer-inp" id="tinp-min" type="text" maxlength="2" value="15" placeholder="MM">
        <span class="timer-sep">:</span>
        <input class="timer-inp" id="tinp-sec" type="text" maxlength="2" value="0" placeholder="SS">
        <button class="timer-set-btn">Set</button>
      </div>
    </div>
    <div class="timer-node-rsz">◢</div>`;

  // ── State ──────────────────────────────────────────────
  const saved=opts.state?JSON.parse(opts.state):null;
  let totalSecs=saved?saved.totalSecs:15*60;
  let remaining=saved?saved.remaining:totalSecs;
  let running=false; // always start paused (inactive_running resumes on activate)
  let widgetState='inactive_running';
  let timerInt=null;
  let flashCount=0;

  const display=el.querySelector('.timer-display');
  const settingsPanel=el.querySelector('.timer-settings');

  function fmt(secs){
    const m=Math.floor(secs/60),s=secs%60;
    return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }

  function updateDisplay(){display.textContent=fmt(remaining);}

  function setFontSize(){
    const w=el.offsetWidth||200;
    display.style.fontSize=Math.max(24,Math.floor(w*0.28))+'px';
  }

  function startTimer(){
    if(timerInt)return;
    running=true;
    timerInt=setInterval(()=>{
      if(remaining<=0){stopTimer();onZero();return;}
      remaining--;
      updateDisplay();
      saveState();
    },1000);
    el.querySelector('#tbtn-play').style.opacity='.4';
    el.querySelector('#tbtn-pause').style.opacity='1';
  }

  function stopTimer(){
    if(timerInt){clearInterval(timerInt);timerInt=null;}
    running=false;
    if(el.querySelector('#tbtn-play'))el.querySelector('#tbtn-play').style.opacity='1';
    if(el.querySelector('#tbtn-pause'))el.querySelector('#tbtn-pause').style.opacity='.4';
  }

  function onZero(){
    // Flash display 10 times then stop
    flashCount=0;
    const flashInt=setInterval(()=>{
      display.classList.toggle('flash');
      flashCount++;
      if(flashCount>=20)clearInterval(flashInt);
    },300);
  }

  function resetTimer(){
    stopTimer();remaining=totalSecs;updateDisplay();saveState();
  }

  function setTime(mins,secs){
    totalSecs=mins*60+secs;
    remaining=totalSecs;
    stopTimer();updateDisplay();saveState();
  }

  function saveState(){
    el.dataset.state=JSON.stringify({totalSecs,remaining,running});
    sched();
  }

  // ── Widget states ─────────────────────────────────────
  // inactive_running: timer keeps running in background
  // active: node focused, double amber outline
  function activate(){
    widgetState='active';
    el.classList.add('timer-active');
    el.style.zIndex=nZWidget();
    ci.querySelectorAll('.timer-node.timer-active').forEach(t=>{
      if(t!==el){t.classList.remove('timer-active');}
    });
  }

  function deactivate(){
    widgetState='inactive_running';
    el.classList.remove('timer-active');
    // Timer keeps running — inactive_running
  }

  el.addEventListener('timer-activate',activate);
  el.addEventListener('timer-deactivate',deactivate);

  // ── Controls ──────────────────────────────────────────
  el.querySelector('#tbtn-play').addEventListener('click',e=>{e.stopPropagation();activate();startTimer();});
  el.querySelector('#tbtn-pause').addEventListener('click',e=>{e.stopPropagation();activate();stopTimer();saveState();});
  el.querySelector('#tbtn-reset').addEventListener('click',e=>{e.stopPropagation();activate();resetTimer();});

  el.querySelector('.timer-settings-toggle').addEventListener('mousedown',e=>e.stopPropagation());
  let preSettingsH=null;
  el.querySelector('.timer-settings-toggle').addEventListener('click',e=>{
    e.stopPropagation();
    if(settingsPanel.style.display==='none'){
      preSettingsH=el.offsetHeight+'px'; // always capture current rendered height
      settingsPanel.style.display='block';
      el.style.height=el.scrollHeight+'px';
    } else {
      settingsPanel.style.display='none';
      el.style.height=preSettingsH;
    }
  });

  el.querySelector('.timer-del').addEventListener('mousedown',e=>e.stopPropagation());
  el.querySelector('.timer-del').addEventListener('click',e=>{
    e.stopPropagation();
    inlineConfirm(el,'Remove timer?',()=>{stopTimer();el.remove();sched();});
  });

  el.querySelectorAll('.timer-preset').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      setTime(parseInt(btn.dataset.min),parseInt(btn.dataset.sec));
      settingsPanel.style.display='none';
      el.style.height=preSettingsH;
    });
  });

  el.querySelector('.timer-set-btn').addEventListener('click',e=>{
    e.stopPropagation();
    const m=Math.max(0,Math.min(99,parseInt(el.querySelector('#tinp-min').value)||0));
    const s=Math.max(0,Math.min(59,parseInt(el.querySelector('#tinp-sec').value)||0));
    setTime(m,s);
    settingsPanel.style.display='none';
    if(preSettingsH!==null)el.style.height=preSettingsH;
  });

  el.querySelectorAll('.timer-inp').forEach(inp=>{
    inp.addEventListener('mousedown',e=>e.stopPropagation());
    inp.addEventListener('keydown',e=>e.stopPropagation());
  });

  // Click body → activate
  el.addEventListener('click',e=>{if(!e.target.closest('.timer-header'))activate();});
  el.addEventListener('mousedown',e=>{if(e.target.closest('.timer-header'))return;e.stopPropagation();});

  // ── Drag ──────────────────────────────────────────────
  let gsx,gsy,gsl,gst;
  function onTMove(e){el.style.left=Math.max(0,gsl+(e.clientX-gsx)/zoom)+'px';el.style.top=Math.max(0,gst+(e.clientY-gsy)/zoom)+'px';}
  function onTUp(){document.removeEventListener('mousemove',onTMove);document.removeEventListener('mouseup',onTUp);sched();}
  el.querySelector('.timer-header').addEventListener('mousedown',e=>{
    if(e.target.classList.contains('timer-header-btn'))return;
    e.preventDefault();e.stopPropagation();
    el.dispatchEvent(new CustomEvent('timer-activate'));
    gsx=e.clientX;gsy=e.clientY;
    gsl=parseInt(el.style.left)||0;gst=parseInt(el.style.top)||0;
    el.style.zIndex=nZ();
    document.addEventListener('mousemove',onTMove);
    document.addEventListener('mouseup',onTUp);
  });

  // ── Resize ────────────────────────────────────────────
  mkResize(el,el.querySelector('.timer-node-rsz'));

  // ── Init ──────────────────────────────────────────────
  updateDisplay();
  setTimeout(setFontSize,50);
  // Observe size changes to scale font
  if(window.ResizeObserver){
    new ResizeObserver(setFontSize).observe(el);
  }

  mkGroupDrag(el);
  ci.appendChild(el);
  return el;

// ── SUDOKU WIDGET ─────────────────────────────────────
// Sudoku puzzle generator using backtracking
function generateSudoku(difficulty){
  // Start with a solved board
  const board=Array(81).fill(0);
  solveSudoku(board);
  const solved=board.slice();
  // Remove cells based on difficulty
  const remove={easy:35,medium:45,hard:55}[difficulty]||45;
  let removed=0;
  const indices=[...Array(81).keys()].sort(()=>Math.random()-.5);
  for(const i of indices){
    if(removed>=remove)break;
    const val=board[i];
    board[i]=0;
    // Check unique solution (simplified - just ensure solvable)
    const test=board.slice();
    if(countSolutions(test)===1){removed++;}
    else{board[i]=val;}
  }
  return{puzzle:board,solution:solved};
}

function solveSudoku(board){
  const empty=board.indexOf(0);
  if(empty===-1)return true;
  const row=Math.floor(empty/9),col=empty%9;
  const nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-.5);
  for(const n of nums){
    if(isValid(board,empty,n)){
      board[empty]=n;
      if(solveSudoku(board))return true;
      board[empty]=0;
    }
  }
  return false;
}

function countSolutions(board,limit=2){
  const empty=board.indexOf(0);
  if(empty===-1)return 1;
  let count=0;
  for(let n=1;n<=9;n++){
    if(isValid(board,empty,n)){
      board[empty]=n;
      count+=countSolutions(board,limit);
      board[empty]=0;
      if(count>=limit)return count;
    }
  }
  return count;
}

function isValid(board,idx,n){
  const row=Math.floor(idx/9),col=idx%9;
  for(let c=0;c<9;c++){if(board[row*9+c]===n)return false;}
  for(let r=0;r<9;r++){if(board[r*9+col]===n)return false;}
  const br=Math.floor(row/3)*3,bc=Math.floor(col/3)*3;
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){if(board[(br+r)*9+(bc+c)]===n)return false;}
  return true;
}
