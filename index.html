<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteKeeper</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;500;600&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Fira+Code:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;500;600&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f5f2ed;--toolbar:#2a2724;--tborder:#3d3a36;--tbtext:#a09890;--ibg:#2a2724;
  --accent:#c9a96e;--accentH:#b8935a;--danger:#c0392b;
  --shadow:0 2px 12px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
  --shadow-drag:0 12px 40px rgba(0,0,0,.18),0 4px 12px rgba(0,0,0,.1);
}


/* canvas and notes are ALWAYS light */
body{font-family:'Syne',sans-serif;background:var(--bg);color:#1a1714;display:flex;flex-direction:column;height:100vh;overflow:hidden;user-select:none;transition:background .2s}

/* ── APP LAYOUT ── */
#app-body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR – always light ── */
#sidebar{width:220px;background:#f5f2ed;display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid #e0dbd2}
#sidebar-header{padding:12px 14px 10px;border-bottom:1px solid #e0dbd2;display:flex;align-items:center;gap:6px;background:#f5f2ed}
#app-version{font-size:9px;color:#c0bab4;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;margin-top:1px}
#sidebar-header h1{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.1em;text-transform:uppercase}


/* Search */
#search-wrap{padding:7px 8px;border-bottom:1px solid #e0dbd2;position:relative;background:#f5f2ed}
#search-input{width:100%;background:#fff;border:1px solid #e0dbd2;border-radius:6px;padding:5px 10px 5px 26px;color:#1a1714;font-family:'Syne',sans-serif;font-size:13px;outline:none}
#search-input::placeholder{color:#a09890}
#search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#a09890;font-size:12px;pointer-events:none}
#search-results{display:none;position:absolute;left:8px;right:8px;top:calc(100% - 2px);background:#fff;border:1px solid #e0dbd2;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:999;max-height:300px;overflow-y:auto}
#search-results.vis{display:block}
.sr{padding:8px 12px;cursor:pointer;border-bottom:1px solid #e8e3da}
.sr:last-child{border-bottom:none}
.sr:hover{background:#f5f2ed}
.sr-pg{font-size:10px;color:#a09890;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.sr-title{font-size:13px;color:#1a1714;font-weight:500}
.sr-snip{font-size:11px;color:#6b6560;margin-top:2px;font-family:'Lora',serif}
.sr-snip mark,.sr-title mark{background:rgba(201,169,110,.3);color:inherit;border-radius:2px}
.sr-empty{padding:14px 12px;font-size:12px;color:#a09890;text-align:center}

/* Pages label */
#pages-label{padding:7px 8px 5px 14px;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#a09890;background:#f5f2ed;display:flex;align-items:center;justify-content:space-between}
#add-page-inline-btn{background:none;border:none;cursor:pointer;color:#c0bab4;font-size:18px;padding:0 6px 0 0;line-height:1;transition:color .15s;font-weight:300}
#add-page-inline-btn:hover{color:var(--accent)}

#pages-list{flex:1;overflow-y:auto;padding:4px 8px;background:#f5f2ed;cursor:default}
#pages-list::-webkit-scrollbar{width:3px}
#pages-list::-webkit-scrollbar-thumb{background:#d5cfc6;border-radius:2px}

/* Page tabs – 3 levels */
.page-tab{display:flex;align-items:center;gap:4px;padding:5px 8px;border-radius:7px;cursor:pointer;margin-bottom:2px;transition:background .12s,opacity .15s,border-color .15s;color:#4a4743;font-size:14px;position:relative;user-select:none;border:1px solid #e0dbd2;background:#e8e4de}
.page-tab.drag-over-into{background:rgba(201,169,110,.15) !important;border-color:var(--accent) !important}
.page-tab.dragging-page{opacity:.35}
#drag-line{position:fixed;left:0;right:0;height:3px;background:var(--accent);border-radius:2px;pointer-events:none;z-index:9999;display:none;box-shadow:0 0 8px rgba(201,169,110,.7)}
#drag-line::before{content:'';position:absolute;left:8px;top:-3px;width:9px;height:9px;border-radius:50%;background:var(--accent)}
.page-tab:hover{background:#f5f2ed;border-color:#d5cfc6}
.page-tab.lvl0{margin-left:0px;margin-right:0px}
.page-tab.lvl1{margin-left:12px;margin-right:0px}
.page-tab.lvl2{margin-left:24px;margin-right:0px}
.page-tab.active{background:#fff !important;color:#1a1714;font-weight:700;border-color:#e0dbd2;border-left:3px solid var(--accent)}
.page-tab.active::before{content:none}
.page-tab.lvl1{font-size:14px;color:#4a4743}
.page-tab.lvl2{font-size:14px;color:#4a4743}
/* spacer keeps alignment when no collapse arrow */
.pg-col-spacer{display:inline-block;width:22px;flex-shrink:0}
.pg-col-btn{background:none;border:none;cursor:pointer;color:#b0aca6;font-size:18px;padding:0;flex-shrink:0;transition:transform .2s,color .15s;line-height:1;width:22px;display:flex;align-items:center;justify-content:center}
.pg-col-btn:hover{color:var(--accent)}
.pg-col-btn.col{transform:rotate(-90deg)}
.pg-col-btn:hover{color:var(--accent)}
.page-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.page-name-inp{flex:1;background:transparent;border:none;outline:none;color:#1a1714;font-family:'Syne',sans-serif;font-size:12px;padding:0}
.page-addsub{opacity:0;background:none;border:none;cursor:pointer;color:#a09890;font-size:14px;padding:0 2px;transition:color .15s,opacity .15s;flex-shrink:0;line-height:1}
.page-color-btn{opacity:0;background:none;border:none;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1;transition:opacity .15s;display:flex;align-items:center}
.page-tab:hover .page-color-btn{opacity:1}
.page-color-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.15);display:inline-block;flex-shrink:0}
.pg-color-popup{display:none;position:fixed;background:#fff;border:1px solid #e0dbd2;border-radius:8px;padding:6px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.12);gap:5px;flex-wrap:wrap;width:130px}
.pg-color-popup.open{display:flex}
.pg-csw{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0}
.pg-csw:hover{transform:scale(1.2)}
.pg-csw.on{border-color:#666}
.page-tab:hover .page-addsub{opacity:1}
.page-addsub:hover{color:var(--accent)}
.page-del{opacity:0;background:none;border:none;cursor:pointer;color:#a09890;font-size:10px;padding:0 2px;transition:color .15s,opacity .15s;flex-shrink:0}
.page-tab[data-pgcolor="yellow"]{background:#fffde8;border-color:#e8dfa0}
.page-tab[data-pgcolor="green"]{background:#edf8ed;border-color:#a8d8a8}
.page-tab[data-pgcolor="blue"]{background:#edf2ff;border-color:#a8c0f0}
.page-tab[data-pgcolor="pink"]{background:#fff0f5;border-color:#f0b8cc}
.page-tab[data-pgcolor="purple"]{background:#f3eeff;border-color:#c8a8e8}
.page-tab[data-pgcolor="orange"]{background:#fff5ed;border-color:#f0c898}
.page-tab[data-pgcolor="red"]{background:#fff0f0;border-color:#f0b8b8}
.page-tab[data-pgcolor="yellow"]:hover,.page-tab[data-pgcolor="green"]:hover,.page-tab[data-pgcolor="blue"]:hover,
.page-tab[data-pgcolor="pink"]:hover,.page-tab[data-pgcolor="purple"]:hover,.page-tab[data-pgcolor="orange"]:hover,
.page-tab[data-pgcolor="red"]:hover{filter:brightness(.97)}
.page-tab:hover .page-del{opacity:1}
.page-del:hover{color:var(--danger)}






/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Toolbar – dark left + light right */
#toolbar-wrap{display:flex;flex-shrink:0;border-bottom:1px solid #e0dbd2}
#toolbar{height:44px;background:#f5f2ed;display:flex;align-items:center;gap:2px;padding:0 8px;overflow-x:auto;flex:1}
#toolbar::-webkit-scrollbar{height:2px}
#toolbar-right{display:flex;align-items:center;gap:4px;padding:0 10px;background:#f5f2ed;border-left:1px solid #e0dbd2;height:44px;flex-shrink:0}
.tsep{width:1px;height:18px;background:#e0dbd2;margin:0 3px;flex-shrink:0}
.tsep-light{width:1px;height:18px;background:#e0dbd2;margin:0 3px;flex-shrink:0}
.tb{background:none;border:none;cursor:pointer;color:#6b6560;padding:4px 6px;border-radius:4px;font-size:12px;font-family:'Syne',sans-serif;font-weight:500;transition:background .12s,color .12s;display:flex;align-items:center;justify-content:center;min-width:24px;height:28px;line-height:1;flex-shrink:0;white-space:nowrap}
.tb:hover{background:#e8e3da;color:#1a1714}
.tb-light{background:none;border:none;cursor:pointer;color:#6b6560;padding:4px 8px;border-radius:4px;font-size:12px;font-family:'Syne',sans-serif;font-weight:500;transition:background .12s,color .12s;height:28px;white-space:nowrap}
.tb-light:hover{background:#e8e3da;color:#1a1714}
.tb.B{font-weight:700}.tb.I{font-style:italic}.tb.U{text-decoration:underline}
#fsz{background:#fff;border:1px solid #e0dbd2;color:#4a4743;font-family:'Syne',sans-serif;font-size:11px;padding:2px 4px;border-radius:4px;cursor:pointer;height:26px;flex-shrink:0}
#tclr{width:24px;height:24px;border:none;padding:0;border-radius:4px;cursor:pointer;background:none;flex-shrink:0}

.games-menu-wrap{position:relative;display:inline-block;z-index:99999}
.games-menu{position:fixed;background:#f5f2ed;border:1px solid #e0dbd2;border-radius:6px;padding:4px;z-index:99999;min-width:140px;box-shadow:0 4px 16px rgba(0,0,0,.08);display:none}
.games-menu.open{display:block}
.games-menu-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:4px;cursor:pointer;color:#4a4743;font-family:'Syne',sans-serif;font-size:12px;white-space:nowrap}
.games-menu-item:hover{background:#f5f2ed;color:#1a1714}
.create-btn{background:none;border:1px solid #d8d3cb;cursor:pointer;color:#4a4743;padding:4px 9px;border-radius:5px;font-size:12px;font-family:'Syne',sans-serif;font-weight:500;transition:background .12s,border-color .12s,color .12s;height:28px;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0}
.create-btn:hover{background:#e8e3da;border-color:#c0bab4;color:#1a1714}
.create-btn:active{background:#ddd8d0}
.add-btn:hover{background:var(--accentH)}

/* Notebook bar – light */
#nb-bar{background:#f0ece4;border-bottom:1px solid #e0dbd2;display:flex;align-items:center;gap:0;padding:0 8px;height:34px;flex-shrink:0;overflow-x:auto}
#nb-bar::-webkit-scrollbar{height:2px}
#nb-bar::-webkit-scrollbar-thumb{background:#d5cfc6}
.nb-tab{display:flex;align-items:center;gap:5px;padding:0 14px;height:36px;cursor:pointer;font-size:13px;font-family:'Syne',sans-serif;color:#8a8480;border-right:1px solid #e0dbd2;white-space:nowrap;transition:background .15s,opacity .15s;flex-shrink:0;position:relative;background:#e8e4de}
.nb-tab[data-nbcolor="yellow"]{background:#fffde8;color:#7a6a20}
.nb-tab[data-nbcolor="green"]{background:#edf8ed;color:#2a6a2a}
.nb-tab[data-nbcolor="blue"]{background:#edf2ff;color:#2a4a8a}
.nb-tab[data-nbcolor="pink"]{background:#fff0f5;color:#8a2a50}
.nb-tab[data-nbcolor="purple"]{background:#f3eeff;color:#5a2a8a}
.nb-tab[data-nbcolor="orange"]{background:#fff5ed;color:#8a4a10}
.nb-tab[data-nbcolor="red"]{background:#fff0f0;color:#8a2a2a}
.nb-tab[data-nbcolor].active{background:#fff !important;color:#1a1714 !important}
.nb-color-btn{background:none;border:none;cursor:pointer;padding:0 0 0 4px;flex-shrink:0;line-height:1;display:flex;align-items:center;opacity:0;transition:opacity .15s}
.nb-tab:hover .nb-color-btn{opacity:1}
.nb-color-dot{width:9px;height:9px;border-radius:50%;border:1px solid rgba(0,0,0,.2);display:inline-block}
.nb-cp-popup{display:none;position:fixed;background:#fff;border:1px solid #e0dbd2;border-radius:8px;padding:6px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.12);gap:5px;flex-wrap:wrap;width:130px}
.nb-cp-popup.open{display:flex}
.nb-cp-sw{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s}
.nb-cp-sw:hover{transform:scale(1.2)}
.nb-cp-sw.on{border-color:#555}
.nb-tab.drag-over-left{border-left:2px solid var(--accent)}
.nb-tab.drag-over-right{border-right:2px solid var(--accent) !important}
.nb-tab.dragging-nb{opacity:.4}
.nb-tab:hover{background:rgba(0,0,0,.04)}
.nb-tab.active{background:#fff !important;color:#1a1714;font-weight:700}
.nb-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--accent);border-radius:2px 2px 0 0}
.nb-dots-btn{background:none;border:none;cursor:pointer;color:transparent;font-size:15px;padding:0 0 0 6px;line-height:1;transition:color .15s;letter-spacing:1px;flex-shrink:0}
.nb-tab:hover .nb-dots-btn{color:#a09890}
.nb-dots-btn:hover{color:var(--accent) !important}
.nb-ctx-menu{position:fixed;background:#fff;border:1px solid #e0dbd2;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:9999;min-width:180px;padding:4px 0;font-family:'Syne',sans-serif}
.nb-ctx-item{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:13px;color:#4a4743;cursor:pointer;transition:background .12s;white-space:nowrap}
.nb-ctx-item:hover{background:#f5f2ed}
.nb-ctx-item.danger{color:var(--danger)}
.nb-ctx-item.danger:hover{background:#fff5f5}
.nb-ctx-sep{height:1px;background:#e8e3da;margin:3px 0}
.nb-ctx-icon{font-size:12px;width:16px;text-align:center;flex-shrink:0}
.nb-name{}
.nb-name-inp{background:transparent;border:none;outline:none;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;color:#1a1714;width:80px}
#nb-add-btn{background:none;border:none;cursor:pointer;color:#a09890;font-size:20px;padding:0 6px;height:34px;transition:color .15s;flex-shrink:0;line-height:1}
#nb-add-btn:hover{color:var(--accent)}

/* ── CANVAS – always light ── */
#canvas{flex:1;position:relative;overflow:auto;background:#faf8f4;min-height:0}
#ci{position:relative;width:3000px;height:2000px}
#ci::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#d8d3cb 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
#hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:.3}
#hint .hbig{font-size:28px;margin-bottom:8px}
#hint p{font-size:12px;color:#6b6560;letter-spacing:.04em}
#canvas::-webkit-scrollbar{width:8px;height:8px}
#canvas::-webkit-scrollbar-thumb{background:#d5cfc6;border-radius:4px}

/* Zoom */
#zbar{position:absolute;bottom:12px;right:16px;display:flex;align-items:center;gap:5px;background:var(--toolbar);border:1px solid var(--tborder);border-radius:8px;padding:4px 8px;z-index:100}
#zbar button{background:none;border:none;cursor:pointer;color:var(--tbtext);font-size:14px;width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:background .12s}
#zbar button:hover{background:#3a3632;color:#e0dbd2}
#zlbl{font-size:11px;color:var(--tbtext);font-family:'JetBrains Mono',monospace;min-width:34px;text-align:center}

/* ── NOTES – always light ── */
.note.note.dragging{box-shadow:var(--shadow-drag);opacity:.95;z-index:1000}
.note:focus-within{border-color:var(--accent);box-shadow:var(--shadow),0 0 0 2px rgba(201,169,110,.2)}
.note[data-color="yellow"]{background:#fffce8;border-color:#e8dfa0}
.note[data-color="yellow"] .note[data-color="green"]{background:#eef8ee;border-color:#b0d8b0}
.note[data-color="green"] .note[data-color="blue"]{background:#eef3ff;border-color:#b0c4f0}
.note[data-color="blue"] .note[data-color="pink"]{background:#fff0f5;border-color:#f0b8cc}
.note[data-color="pink"] .note[data-color="purple"]{background:#f5eeff;border-color:#c8a8e8}
.note[data-color="purple"] .note[data-color="dark"]{background:#252220;border-color:#4a4642}
.note[data-color="dark"] .note[data-color="dark"] .nbody,.note[data-color="dark"] .nhdr:active{cursor:grabbing}
.ndh{color:#ccc;font-size:10px;flex-shrink:0}
.nti.editing{cursor:text;pointer-events:auto;user-select:text;border-bottom:1px solid var(--accent)}
.nab{background:none;border:none;cursor:pointer;width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#ccc;transition:background .12s,color .12s}
.nab:hover{background:rgba(0,0,0,.07);color:#1a1714}
.nab.del:hover{color:var(--danger)}
.cpop.open{display:flex}
.csw:hover{transform:scale(1.15)}
.csw.on{border-color:var(--accent)}
.csw[data-c="default"]{background:linear-gradient(135deg,#fff 50%,#f0ece4 50%);border:2px solid #ddd}
.csw[data-c="yellow"]{background:#f5e87a}.csw[data-c="green"]{background:#7ade7a}
.csw[data-c="blue"]{background:#7aaade}.csw[data-c="pink"]{background:#de7aaa}
.csw[data-c="purple"]{background:#aa7ade}.csw[data-c="dark"]{background:#252220}
.nbody img{max-width:100%;border-radius:4px;margin:4px 0;display:block}
.tpill:hover{background:rgba(201,169,110,.3)}
.snhdr:hover{color:#6b6560}
.sncnt{background:#e8e3da;color:#6b6560;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px}
.sntog.col{transform:rotate(-90deg)}
.snihdr{display:flex;align-items:center;gap:4px;padding:4px 7px;background:#f0ece4;border-bottom:1px solid #e0dbd2}
.snit{flex:1;background:none;border:none;outline:none;font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6b6560;user-select:text;cursor:text}
.snidel{background:none;border:none;cursor:pointer;color:#ccc;font-size:11px;padding:0 2px}
.snidel:hover{color:var(--danger)}
.snib{padding:6px 8px;outline:none;font-family:'Lora',serif;font-size:12px;line-height:1.6;color:#1a1714;min-height:34px;user-select:text;cursor:text}
.snib img{max-width:100%;border-radius:3px}
.addsnbtn:hover{border-color:var(--accent);color:var(--accent)}

/* ── DRAWING BOXES ── */
.draw-box{position:absolute;background:transparent;border:2px dashed #d5cfc6;border-radius:6px;min-width:120px;min-height:80px;display:flex;flex-direction:column;transition:border-color .15s}
.draw-box.draw-selected{outline:2px solid var(--accent);outline-offset:1px}
.draw-active{border-color:var(--accent);border-style:solid;z-index:500;outline:2px solid var(--accent);outline-offset:3px;box-shadow:0 0 0 5px var(--accent)}
.draw-box.draw-inactive{border:1px solid rgba(0,0,0,.08);cursor:grab}
.draw-box.draw-inactive:hover{border-color:#c8c4bc}
.draw-box.draw-inactive:active{cursor:grabbing}
.draw-header{height:24px;display:flex;align-items:center;justify-content:space-between;padding:0 6px;background:rgba(245,242,237,.85);backdrop-filter:blur(2px);border-radius:4px 4px 0 0;flex-shrink:0;cursor:grab}
.draw-header:active{cursor:grabbing}
.draw-box.draw-active .draw-header{background:rgba(201,169,110,.12);cursor:default}
.draw-header-left{display:flex;align-items:center;gap:5px;font-size:10px;font-family:'Syne',sans-serif;color:#a09890;letter-spacing:.06em;text-transform:uppercase}

.mine-toolbar{background:#c0c0c0;padding:6px 8px;display:flex;align-items:center;justify-content:space-between;border-top:2px solid #fff;border-left:2px solid #fff;border-bottom:2px solid #808080;border-right:2px solid #808080;margin:6px 6px 0 6px;gap:8px}

.mine-n1{color:#0000ff}.mine-n2{color:#008000}.mine-n3{color:#ff0000}.mine-n4{color:#000080}.mine-n5{color:#800000}.mine-n6{color:#008080}.mine-n7{color:#000}.mine-n8{color:#808080}
.mine-cfg{background:#c0c0c0;margin:0 6px 6px;padding:6px;border-top:2px solid #808080;border-left:2px solid #808080;border-bottom:2px solid #fff;border-right:2px solid #fff;display:flex;flex-direction:column;gap:6px}
.mine-cfg-label{font-size:10px;font-family:'Syne',sans-serif;color:#000;letter-spacing:.05em}
.mine-cfg-row{display:flex;gap:3px}
.mine-cfg-btn{flex:1;padding:3px 0;background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-bottom:2px solid #808080;border-right:2px solid #808080;font-size:10px;font-family:'Syne',sans-serif;cursor:pointer;color:#000;text-align:center}
.mine-cfg-btn.active{border-top:2px solid #808080;border-left:2px solid #808080;border-bottom:2px solid #fff;border-right:2px solid #fff;background:#b0b0b0}
.mine-cfg-btn:active{border-top:2px solid #808080;border-left:2px solid #808080;border-bottom:2px solid #fff;border-right:2px solid #fff}
.mine-apply-btn{padding:4px;background:#c0c0c0;border-top:2px solid #fff;border-left:2px solid #fff;border-bottom:2px solid #808080;border-right:2px solid #808080;font-size:11px;font-family:'Syne',sans-serif;cursor:pointer;color:#000;font-weight:600;letter-spacing:.03em}
.mine-apply-btn:active{border-top:2px solid #808080;border-left:2px solid #808080;border-bottom:2px solid #fff;border-right:2px solid #fff}
.mine-settings-btn{background:#c0c0c0;border-top:1px solid #fff;border-left:1px solid #fff;border-bottom:1px solid #808080;border-right:1px solid #808080;font-size:10px;font-family:'Syne',sans-serif;padding:1px 6px;cursor:pointer;color:#000}
.attach-card{position:absolute;background:#fff;border:1px solid #e0dbd2;border-radius:8px;padding:10px 14px;cursor:default;box-shadow:0 2px 12px rgba(0,0,0,.08);display:flex;align-items:center;gap:10px;min-width:180px;max-width:280px;font-family:'Inter',sans-serif;z-index:100}
.attach-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.attach-icon{font-size:22px;flex-shrink:0;line-height:1}
.attach-info{flex:1;overflow:hidden}
.attach-name{font-size:13px;color:#1a1714;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.attach-size{font-size:11px;color:#8a8480;margin-top:2px}
.attach-dl{background:none;border:none;cursor:pointer;color:#8a8480;font-size:16px;padding:2px;border-radius:4px;flex-shrink:0}
.attach-dl:hover{color:#1a1714;background:#f0ece4}
.attach-del{background:none;border:none;cursor:pointer;color:#c0bab4;font-size:12px;padding:2px;border-radius:4px;flex-shrink:0}
.attach-del:hover{color:var(--danger)}
#canvas-drop-overlay{position:absolute;inset:0;background:rgba(201,169,110,.08);border:3px dashed var(--accent);border-radius:8px;pointer-events:none;display:none;z-index:9980;align-items:center;justify-content:center}
#canvas-drop-overlay.vis{display:flex}
#canvas-drop-overlay span{font-family:'Syne',sans-serif;font-size:18px;color:var(--accent);letter-spacing:.05em}
.fn-color-btn{position:absolute;top:-28px;right:28px;background:rgba(255,255,255,.92);border:1px solid #e0dbd2;border-radius:4px;padding:2px 6px;font-size:10px;font-family:'Syne',sans-serif;cursor:pointer;display:none;gap:4px;align-items:center;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.free-note.fn-editing .fn-color-btn,.free-note.fn-selected .fn-color-btn{display:flex}
.fn-del-btn{position:absolute;top:-28px;right:2px;background:rgba(255,255,255,.92);border:1px solid #e0dbd2;border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer;display:none;color:var(--danger);box-shadow:0 2px 8px rgba(0,0,0,.1);line-height:1.2}
.free-note.fn-selected .fn-del-btn,.free-note.fn-editing .fn-del-btn{display:block}
.free-note.fn-selected{border:1.5px dashed #c0bab4;border-radius:4px;cursor:grab}
.fn-color-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.15)}
.dr-s{position:absolute;bottom:-3px;left:20px;right:20px;height:6px;cursor:s-resize;z-index:10}
.dr-w{position:absolute;left:-3px;top:20px;bottom:20px;width:6px;cursor:w-resize;z-index:10}
.dr-e{position:absolute;right:-3px;top:20px;bottom:20px;width:6px;cursor:e-resize;z-index:10}
.dr-nw{position:absolute;top:-3px;left:-3px;width:12px;height:12px;cursor:nw-resize;z-index:11}
.dr-ne{position:absolute;top:-3px;right:-3px;width:12px;height:12px;cursor:ne-resize;z-index:11}
.dr-sw{position:absolute;bottom:-3px;left:-3px;width:12px;height:12px;cursor:sw-resize;z-index:11}
.dr-se{position:absolute;bottom:-3px;right:-3px;width:12px;height:12px;cursor:se-resize;z-index:11;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:9px}
.draw-box.draw-active .dr-n,.draw-box.draw-active .dr-s,.draw-box.draw-active .dr-w,
.draw-box.draw-active .dr-e,.draw-box.draw-active .dr-nw,.draw-box.draw-active .dr-ne,
.draw-box.draw-active .dr-sw,.draw-box.draw-active .dr-se{display:block}
.dr-n,.dr-s,.dr-w,.dr-e,.dr-nw,.dr-ne,.dr-sw,.dr-se{display:none}

/* Drawing toolbar overlay */
#draw-toolbar{display:none;position:absolute;top:6px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #e0dbd2;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);padding:5px 10px;z-index:600;align-items:center;gap:4px;white-space:nowrap}
#draw-toolbar.visible{display:flex}
.dtb-btn{background:none;border:1px solid transparent;cursor:pointer;color:#6b6560;padding:4px 7px;border-radius:6px;font-size:12px;font-family:'Syne',sans-serif;transition:all .12s;height:28px;display:flex;align-items:center;gap:3px;white-space:nowrap}
.dtb-btn:hover{background:#f5f2ed;border-color:#e0dbd2}
.dtb-btn.on{background:#1a1714;color:#fff;border-color:#1a1714}
.dtb-sep{width:1px;height:18px;background:#e8e3da;margin:0 2px;flex-shrink:0}

.dtb-opacity{width:60px;cursor:pointer}
.dtb-label{font-size:10px;color:#a09890;font-family:'Syne',sans-serif}
.nrsz-right:hover{background:rgba(201,169,110,.25)}

/* ── TABLE BOX ── */
.tbl-box{position:absolute;background:#fff;border:1px solid #e0dbd2;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.08);min-width:240px;display:flex;flex-direction:column;user-select:none}

.tbl-header{background:#f5f2ed;border-bottom:1px solid #e0dbd2;border-radius:7px 7px 0 0;padding:5px 8px;display:flex;align-items:center;gap:6px;cursor:grab;flex-shrink:0}
.tbl-header:active{cursor:grabbing}
.tbl-name{background:none;border:none;outline:none;font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6b6560;cursor:default;pointer-events:none;flex:1}

.tbl-actions{display:flex;gap:2px;flex-shrink:0}

.tbl-wrap{overflow:auto;border-radius:0 0 7px 7px;flex:1;min-height:80px}
.tbl-table{border-collapse:collapse;width:auto;font-family:'Inter',sans-serif;font-size:14px}
.tbl-table th,.tbl-table td{border:1px solid #e0dbd2;padding:0;min-width:80px;position:relative}
.tbl-table th{background:#f5f2ed;font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a09890;text-align:center;height:24px}
.tbl-table td{height:28px}
.tbl-row-header{background:#f5f2ed;font-family:'Syne',sans-serif;font-size:10px;color:#a09890;text-align:center;padding:0 4px;min-width:28px;width:28px;user-select:none;cursor:pointer}
.tbl-row-header:hover{background:#e8e3da}
.tbl-col-header{padding:4px 6px;text-align:center;user-select:none;cursor:pointer}

.tbl-cp-popup.open{display:flex}
.tbl-cp-sw{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0}

.tbl-cp-sw.on{border-color:#555}
.tbl-color-btn{background:none;border:1px solid #e0dbd2;border-radius:4px;cursor:pointer;padding:0 6px;height:22px;display:flex;align-items:center;gap:4px;font-size:11px;font-family:'Syne',sans-serif;color:#6b6560;transition:all .12s;flex-shrink:0}
.tbl-color-btn:hover{border-color:var(--accent)}
.tbl-color-dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.15);flex-shrink:0}
.tbl-selecting{background:rgba(100,150,255,.12) !important}
.tbl-cell-input{width:100%;height:100%;border:none;outline:none;background:transparent;font-family:'Inter',sans-serif;font-size:14px;color:#1a1714;padding:2px 5px;box-sizing:border-box;cursor:cell}
.tbl-cell-input:focus{background:rgba(201,169,110,.08);cursor:text}
.tbl-cell-input.formula{color:#1a6abf;font-style:italic}
.tbl-cell-input.error{color:var(--danger)}
.tbl-ctx-menu{position:fixed;background:#fff;border:1px solid #e0dbd2;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:9999;min-width:170px;padding:4px 0;font-family:'Syne',sans-serif}
.tbl-ctx-item{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:12px;color:#4a4743;cursor:pointer;transition:background .12s}

.tbl-ctx-sep{height:1px;background:#e8e3da;margin:3px 0}

.tbl-footer-btn{background:none;border:1px solid #e0dbd2;border-radius:4px;cursor:pointer;font-size:10px;font-family:'Syne',sans-serif;color:#8a8480;padding:2px 7px;transition:all .12s}

.tbl-box-resize{position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:nwse-resize;display:flex;align-items:center;justify-content:center;color:#ddd;font-size:9px;user-select:none}

.tbl-rrsz:hover{background:rgba(201,169,110,.25)}
</style>

<body>
<div id="app-body">
<aside id="sidebar">
  <div id="sidebar-header">
    <h1>NoteKeeper</h1><span id="app-version">3.3.23</span>
  </div>

</aside>

<div id="main">

      <input type="file" id="imp-file" accept=".json" style="display:none">

function curNb(){return st.notebooks.find(n=>n.id===st.activeNb)||st.notebooks[0]||null;}
function nbPages(){return curNb()?curNb().pages:[];}
function findPage(id,pages){
  pages=pages||nbPages();
  for(const p of pages){if(p.id===id)return p;if(p.children){const f=findPage(id,p.children);if(f)return f;}}
  return null;
}
function allPages(pages){
  pages=pages||nbPages();let res=[];
  pages.forEach(p=>{res.push(p);if(p.children)res=res.concat(allPages(p.children));});
  return res;
}
function allPagesAllNbs(){
  let res=[];st.notebooks.forEach(nb=>res=res.concat(allPages(nb.pages)));return res;
}

// ── PERSIST ───────────────────────────────────────────
function save(){
  const payload=JSON.stringify({notebooks:st.notebooks,activeNb:st.activeNb,nextId:st.nextId});
  try{localStorage.setItem(SK,payload);}catch(e){}
  try{if(window.storage)window.storage.set(SK,payload);}catch(e){}
}
async function loadStorage(){
  try{
    // 1. Try window.storage (Claude persistent storage)
    let raw=null;
    if(window.storage){
      try{
        const r=await window.storage.get(SK);
        if(r&&r.value)raw=r.value;
      }catch(e){}
      // Also scan for older keys in window.storage
      if(!raw){
        try{
          const keys=await window.storage.list('notekeeper');
          if(keys&&keys.keys){
            for(const k of keys.keys){
              if(k===SK)continue;
              try{const r=await window.storage.get(k);if(r&&r.value){raw=r.value;break;}}catch(e){}
            }
          }
        }catch(e){}
      }
    }

    // 2. Fall back to localStorage (scan all notekeeper keys)
    if(!raw){
      const tryKeys=[];
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith('notekeeper'))tryKeys.push(k);
      }
      // current key first
      tryKeys.sort((a,b)=>a===SK?-1:b===SK?1:0);
      for(const key of tryKeys){
        try{
          const r=localStorage.getItem(key);
          if(!r)continue;
          const d=JSON.parse(r);
          if((d.notebooks&&d.notebooks.length>0)||(d.pages&&d.pages.length>0)){raw=r;break;}
        }catch(e){}
      }
    }

    if(!raw)return false;
    const d=JSON.parse(raw);

    // Migrate old flat pages format
    if(d.pages&&!d.notebooks){
      d.notebooks=[{id:1,name:'My Notebook',pages:d.pages,activePageId:d.activePage||null}];
      d.activeNb=1;
    }

    st.notebooks=d.notebooks||[];
    st.activeNb=d.activeNb||null;
    st.nextId=d.nextId||1;

    function norm(pages){pages.forEach(p=>{p.children=p.children||[];p.collapsed=!!p.collapsed;p.color=p.color||'default';norm(p.children);});}
    st.notebooks.forEach(nb=>{nb.pages=nb.pages||[];norm(nb.pages);nb.activePageId=nb.activePageId||null;nb.color=nb.color||'default';});

    return st.notebooks.length>0;
  }catch(e){console.error('loadStorage error:',e);return false;}
}

// Convert blob: image URLs to base64 for persistent storage
async function blobUrlsToBase64(html){
  const tmp=document.createElement('div');
  tmp.innerHTML=html;
  const imgs=tmp.querySelectorAll('img[src^="blob:"]');
  await Promise.all(Array.from(imgs).map(img=>new Promise(resolve=>{
    fetch(img.src).then(r=>r.blob()).then(blob=>{
      const reader=new FileReader();
      reader.onload=()=>{img.src=reader.result;resolve();};
      reader.onerror=()=>resolve();
      reader.readAsDataURL(blob);
    }).catch(()=>resolve());
  })));
  return tmp.innerHTML;
}

// Async pre-save: converts blob URLs in note images to base64
async function savePageAsync(){
  const nb=curNb();if(!nb||!nb.activePageId)return;
  const pg=findPage(nb.activePageId);if(!pg)return;
  pg.freeNotes=[];
  const noteEls=[...ci.querySelectorAll('.free-note')];
  await Promise.all(noteEls.map(async el=>{
    const rawHtml=el.querySelector('.fn-body').innerHTML;
    const html=await blobUrlsToBase64(rawHtml);
    pg.freeNotes.push({
      id:el.dataset.id,
      x:parseInt(el.style.left),y:parseInt(el.style.top),
      w:parseInt(el.style.width)||null,h:parseInt(el.style.height)||null,
      html,
      bg:el.dataset.bg||'transparent',
      border:el.dataset.border||'0'
    });
  }));
}

function savePage(){

    pg.codeNodes.push({id:el.dataset.id,x:parseInt(el.style.left),y:parseInt(el.style.top),

      lang:el.dataset.lang||'python',code:el.querySelector('.code-editor').value,title:el.querySelector('.code-node-title')?.textContent||'Untitled'});
  });
  pg.attachments=[];
  ci.querySelectorAll('.attach-card').forEach(el=>{
    pg.attachments.push({id:el.dataset.id,x:parseInt(el.style.left),y:parseInt(el.style.top),
      name:el.dataset.name,size:el.dataset.size,data:el.dataset.filedata,mime:el.dataset.mime});
  });
  ci.querySelectorAll('.free-note').forEach(el=>{
    pg.freeNotes.push({id:el.dataset.id,x:parseInt(el.style.left),y:parseInt(el.style.top),
      w:parseInt(el.style.width)||null,h:parseInt(el.style.height)||null,
      html:el.querySelector('.fn-body').innerHTML,
      bg:el.dataset.bg||'transparent',
      border:el.dataset.border||'0'});
  });
  pg.drawings=[];
  pg.tables=[];
  ci.querySelectorAll('.tbl-box').forEach(el=>{
    const rows=[];
    el.querySelectorAll('tbody tr').forEach(tr=>{
      const rowData=[];
      tr.querySelectorAll('.tbl-cell-input').forEach(inp=>rowData.push(inp.dataset.raw||inp.value||''));
      rows.push(rowData);
    });
    const colWidths=[];
    el.querySelectorAll('colgroup col').forEach(col=>colWidths.push(col.style.width||'80px'));
    const tblColors=[];el.querySelectorAll('tbody tr').forEach((tr,ri)=>{const rowC=[];tr.querySelectorAll('td[data-row]').forEach(td=>{rowC.push(td.style.background||'');});tblColors.push(rowC);});
    pg.tables.push({id:el.dataset.id,x:parseInt(el.style.left),y:parseInt(el.style.top),
      w:parseInt(el.style.width)||null,name:el.querySelector('.tbl-name').value||'Table',
      rows,colWidths,cellColors:tblColors});
  });
  ci.querySelectorAll('.draw-box').forEach(el=>{
    saveDrawing(el);
    pg.drawings.push({id:el.dataset.id,x:parseInt(el.style.left),y:parseInt(el.style.top),
      w:parseInt(el.style.width)||400,h:parseInt(el.style.height)||300,imgdata:el.dataset.imgdata||'',
      name:el.querySelector('.draw-name')?el.querySelector('.draw-name').textContent:'Drawing',
      layer:el.querySelector('.layer-btn')&&el.querySelector('.layer-btn').title==='Send to back'?'front':'back'});
  });
  ci.querySelectorAll('.note').forEach(el=>{
    const sns=[];
    el.querySelectorAll('.sni').forEach(sn=>sns.push({id:sn.dataset.id,title:sn.querySelector('.snit').value,html:sn.querySelector('.snib').innerHTML}));
    pg.boxes.push({id:el.dataset.id,x:parseInt(el.style.left),y:parseInt(el.style.top),
      w:parseInt(el.style.width)||280,h:el.style.height?parseInt(el.style.height):null,
      title:el.querySelector('.nti').value,html:el.querySelector('.nbody').innerHTML,
      color:el.dataset.color||'default',
      font:el.querySelector('.nbody').style.fontFamily||'',
      snCol:el.querySelector('.sntog').classList.contains('col'),subnotes:sns});
  });
}
function loadPage(id,skipSave=false){
  if(!skipSave)savePage();
  const nb=curNb();if(!nb)return;
  nb.activePageId=id;
  const pg=findPage(id);if(!pg)return;
  pagesList.querySelectorAll('.page-tab').forEach(t=>t.classList.toggle('active',+t.dataset.id===id));
  ci.querySelectorAll('.draw-box,.tbl-box,.free-note,.attach-card,.code-node,[data-node-group="widget"]').forEach(e=>e.remove());
  (pg.widgetNodes||pg.gameNodes&&pg.gameNodes.map(g=>({...g,type:'minesweeper'}))||[]).forEach(w=>{
    if(w.type==='minesweeper')mkMinesweeperNode(w);
    else if(w.type==='timer')mkTimerNode(w);
  });
  (pg.codeNodes||[]).forEach(cn=>mkCodeNode(cn));
  (pg.attachments||[]).forEach(a=>mkAttachCard(a));
  (pg.freeNotes||[]).forEach(f=>mkFreeNote(f));
  (pg.tables||[]).forEach(t=>mkTable(t));
  (pg.drawings||[]).forEach(d=>mkDrawBox(d));
  (pg.boxes||[]).forEach(b=>mkNote(b));updateHint();
  if(appReady)sched();
}
function updateHint(){$('hint').style.display=ci.querySelectorAll('.note').length>0?'none':'block';}

// ── NOTEBOOKS ─────────────────────────────────────────
function addNotebook(name){
  const id=gId();
  st.notebooks.push({id,name:name||'Notebook',pages:[],activePageId:null,color:'default'});
  st.activeNb=id;renderNbBar();
  addPage('Page 1');
}
function deleteNotebook(id){
  if(st.notebooks.length<=1){alert('Cannot delete the last notebook.');return;}
  const idx=st.notebooks.findIndex(n=>n.id===id);if(idx<0)return;
  const deletingActive=st.activeNb===id;
  if(deletingActive){
    savePage(); // save deleted notebook's page first
    ci.querySelectorAll('.draw-box,.tbl-box,.free-note,.attach-card,.code-node,[data-node-group="widget"]').forEach(e=>e.remove());
  }
  st.notebooks.splice(idx,1);
  if(deletingActive){
    // Switch manually without calling switchNotebook (avoids extra savePage)
    st.activeNb=st.notebooks[Math.min(idx,st.notebooks.length-1)].id;
    const nb=curNb();
    renderNbBar();renderSidebar();
    if(nb&&nb.activePageId&&findPage(nb.activePageId)){loadPage(nb.activePageId,true);}
    else if(nb&&nb.pages.length>0){loadPage(allPages(nb.pages)[0].id,true);}
    else{updateHint();}
    save();
  } else {
    renderNbBar();save();
  }
}
function switchNotebook(id){
  savePage();st.activeNb=id;
  const nb=curNb();renderNbBar();renderSidebar();
  ci.querySelectorAll('.draw-box,.tbl-box,.free-note,.attach-card,.code-node,[data-node-group="widget"]').forEach(e=>e.remove());
  if(nb&&nb.activePageId&&findPage(nb.activePageId)){loadPage(nb.activePageId,true);}
  else if(nb&&nb.pages.length>0){loadPage(allPages(nb.pages)[0].id,true);}
  else{updateHint();}
}

function initNbImpListener(){
  $('nb-imp-file').addEventListener('change',function(){
    const file=this.files[0];if(!file||!importTargetNb)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        const src=d.notebook||d;
        const incoming=src.pages||[];
        if(!incoming.length){alert('No pages found in file.');return;}
        let lid=st.nextId+1000;const nid=()=>lid++;
        function remapPg(pg){return{...pg,id:nid(),children:(pg.children||[]).map(remapPg),boxes:(pg.boxes||[]).map(b=>({...b,id:nid(),subnotes:(b.subnotes||[]).map(sn=>({...sn,id:nid()}))}))}}
        const imported=incoming.map(remapPg);
        importTargetNb.pages.push(...imported);
        st.nextId=lid;
        renderSidebar();save();
        const choice=confirm('Imported '+imported.length+' page(s) into "'+importTargetNb.name+'". Switch to this notebook now?');
        if(choice){st.activeNb=importTargetNb.id;switchNotebook(importTargetNb.id);}
        importTargetNb=null;
      }catch(err){alert('Import failed: '+err.message);}
    };
    reader.readAsText(file);
  });
  $('nb-new-imp-file').addEventListener('change',function(){
    const file=this.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        // Support single-notebook export or full export format
        const src=d.notebook||d;
        const nbName=src.name||(d.notebook?d.notebook.name:'Imported Notebook');
        const incoming=src.pages||[];
        let lid=st.nextId+1000;const nid=()=>lid++;
        function remapPg(pg){return{...pg,id:nid(),children:(pg.children||[]).map(remapPg),boxes:(pg.boxes||[]).map(b=>({...b,id:nid(),subnotes:(b.subnotes||[]).map(sn=>({...sn,id:nid()}))}))}}
        const newNb={id:nid(),name:nbName+' (imported)',pages:incoming.map(remapPg),activePageId:null};
        st.notebooks.push(newNb);
        st.nextId=lid;
        renderNbBar();save();
        if(confirm('Notebook "'+newNb.name+'" created with '+newNb.pages.length+' page(s). Switch to it now?')){
          st.activeNb=newNb.id;switchNotebook(newNb.id);
        }
      }catch(err){alert('Import failed: '+err.message);}
    };
    reader.readAsText(file);
  });
}

function renderNbBar(){
  const bar=$('nb-bar');
  bar.querySelectorAll('.nb-tab').forEach(t=>t.remove());
  const addBtn=$('nb-add-btn');
  st.notebooks.forEach(nb=>{
    const tab=document.createElement('div');tab.className='nb-tab'+(nb.id===st.activeNb?' active':'');tab.dataset.id=nb.id;
    if(nb.color&&nb.color!=='default')tab.setAttribute('data-nbcolor',nb.color);
    const nbDotBg=NB_COLORS.find(cc=>cc.id===(nb.color||'default'))?.bg||'#f0ece4';
    tab.innerHTML=`<span class="nb-name">${esc(nb.name)}</span><button class="nb-color-btn" title="Notebook color"><span class="nb-color-dot" style="background:${nbDotBg}"></span></button><button class="nb-dots-btn" title="Notebook options">···</button>`;
    tab.querySelector('.nb-color-btn').addEventListener('click',e=>{e.stopPropagation();showNbColorPopup(nb,e.currentTarget);});
    tab.querySelector('.nb-dots-btn').addEventListener('click',e=>{e.stopPropagation();showNbCtxMenu(nb,e.currentTarget);});
    tab.addEventListener('dblclick',e=>{if(e.target.classList.contains('nb-dots-btn'))return;e.stopPropagation();startRenameNb(nb);});
    tab.addEventListener('click',e=>{if(e.target.classList.contains('nb-dots-btn'))return;if(nb.id!==st.activeNb)switchNotebook(nb.id);});
    // Drag to reorder notebooks
    tab.draggable=true;
    tab.addEventListener('dragstart',e=>{e.dataTransfer.setData('nb-id',String(nb.id));tab.classList.add('dragging-nb');e.dataTransfer.effectAllowed='move';});
    tab.addEventListener('dragend',()=>tab.classList.remove('dragging-nb'));
    tab.addEventListener('dragover',e=>{
      e.preventDefault();e.dataTransfer.dropEffect='move';
      const r=tab.getBoundingClientRect();
      const mid=r.left+r.width/2;
      bar.querySelectorAll('.nb-tab').forEach(t=>{t.classList.remove('drag-over-left','drag-over-right');});
      tab.classList.add(e.clientX<mid?'drag-over-left':'drag-over-right');
    });
    tab.addEventListener('dragleave',()=>tab.classList.remove('drag-over-left','drag-over-right'));
    tab.addEventListener('drop',e=>{
      e.preventDefault();tab.classList.remove('drag-over-left','drag-over-right');
      const fromId=+e.dataTransfer.getData('nb-id');
      const toId=nb.id;
      if(fromId===toId)return;
      const fromIdx=st.notebooks.findIndex(n=>n.id===fromId);
      const toIdx=st.notebooks.findIndex(n=>n.id===toId);
      if(fromIdx<0||toIdx<0)return;
      const r=tab.getBoundingClientRect();
      const insertBefore=e.clientX<r.left+r.width/2;
      const [moved]=st.notebooks.splice(fromIdx,1);
      const newIdx=st.notebooks.findIndex(n=>n.id===toId);
      st.notebooks.splice(insertBefore?newIdx:newIdx+1,0,moved);
      renderNbBar();sched();
    });
    bar.insertBefore(tab,addBtn);
  });
}

function addPage(title,parentId=null){
  const nb=curNb();if(!nb)return;
  const id=gId();
  const pg={id,title:title||'Untitled',parentId:parentId||null,collapsed:false,children:[],color:'default'};
  if(parentId){
    const parent=findPage(parentId,nb.pages);
    if(parent){parent.children=parent.children||[];parent.children.push(pg);parent.collapsed=false;}
    else nb.pages.push(pg);
  } else {
    nb.pages.push(pg);
  }
  renderSidebar();loadPage(id);
}
function delPage(id){
  const nb=curNb();if(!nb)return;
  function rem(list){const idx=list.findIndex(p=>p.id===id);if(idx>=0){list.splice(idx,1);return true;}for(const p of list){if(p.children&&rem(p.children))return true;}return false;}
  rem(nb.pages);renderSidebar();
  const all=allPages(nb.pages);
  if(!all.length){nb.activePageId=null;ci.querySelectorAll('.note,.draw-box,.tbl-box').forEach(e=>e.remove());updateHint();}
  else{const still=all.find(p=>p.id===nb.activePageId);if(!still)loadPage(all[0].id);}
  save();
}

// ── Page drag helpers (defined once, outside mkTab) ──
function getDropZone(e,tab){
  const r=tab.getBoundingClientRect();
  const rel=(e.clientY-r.top)/r.height;
  if(rel<0.28)return 'above';
  if(rel>0.72)return 'below';
  return 'into';
}
function isDescendant(page,targetId){
  if(!page.children)return false;
  for(const ch of page.children){
    if(ch.id===targetId)return true;
    if(isDescendant(ch,targetId))return true;
  }
  return false;
}
function extractPage(id){
  const nb=curNb();if(!nb)return;
  function rem(list){
    const idx=list.findIndex(p=>p.id===id);
    if(idx>=0){list.splice(idx,1);return true;}
    for(const p of list){if(p.children&&rem(p.children))return true;}
    return false;
  }
  rem(nb.pages);
}
function clearDragStyles(){
  pagesList.querySelectorAll('.page-tab').forEach(t=>t.classList.remove('drag-over-above','drag-over-below','drag-over-into'));
  const dl=$('drag-line');if(dl)dl.style.display='none';
}
function showDragLine(tab,position){
  const dl=$('drag-line');if(!dl)return;
  const tabRect=tab.getBoundingClientRect();
  const y=position==='above'?tabRect.top:tabRect.bottom;
  const sidebarRect=pagesList.closest('#sidebar').getBoundingClientRect();
  dl.style.left=sidebarRect.left+'px';
  dl.style.right=(window.innerWidth - sidebarRect.right)+'px';
  dl.style.top=(y-1)+'px';
  dl.style.display='block';
}

function mkTab(pg,level){
  const nb=curNb();
  const isActive=nb&&nb.activePageId===pg.id;
  const tab=document.createElement('div');
  tab.className='page-tab lvl'+level+(isActive?' active':'');
  tab.dataset.id=pg.id;
  const hasKids=pg.children&&pg.children.length>0;
  // collapse button only if has children; empty spacer otherwise
  const colEl=hasKids
    ?`<button class="pg-col-btn${pg.collapsed?' col':''}" title="Collapse">▾</button>`
    :`<span class="pg-col-spacer"></span>`;
  const addSubHtml=level<2?`<button class="page-addsub" title="Add subpage">+</button>`:'';
  const pgCol=pg.color&&pg.color!=='default'?pg.color:'default';
  if(pgCol!=='default')tab.setAttribute('data-pgcolor',pgCol);
  const dotBg=PG_COLORS.find(c=>c.id===pgCol)?.bg||'#ffffff';
  tab.innerHTML=`${colEl}<span class="page-name">${esc(pg.title||'Untitled')}</span><button class="page-color-btn" title="Page color"><span class="page-color-dot" style="background:${dotBg}"></span></button>${addSubHtml}<button class="page-del">✕</button>`;
  if(hasKids){
    tab.querySelector('.pg-col-btn').addEventListener('click',e=>{e.stopPropagation();pg.collapsed=!pg.collapsed;renderSidebar();save();});
  }
  if(level<2){
    const asb=tab.querySelector('.page-addsub');
    if(asb)asb.addEventListener('click',e=>{e.stopPropagation();addPage('New Subpage',pg.id);});
  }
  tab.querySelector('.page-color-btn').addEventListener('click',e=>{e.stopPropagation();showPgColorPopup(pg,e.currentTarget);});
  tab.querySelector('.page-del').addEventListener('click',e=>{e.stopPropagation();inlineConfirm(tab,'Delete "'+pg.title+'" and subpages?',()=>delPage(pg.id));});
  tab.querySelector('.page-name').addEventListener('dblclick',e=>{
    e.stopPropagation();const span=tab.querySelector('.page-name');
    const inp=document.createElement('input');inp.className='page-name-inp';inp.value=pg.title;
    span.replaceWith(inp);inp.focus();inp.select();
    const done=()=>{pg.title=inp.value||'Untitled';renderSidebar();save();};
    inp.addEventListener('blur',done);inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')inp.blur();});
  });
  tab.addEventListener('click',e=>{
    if(e.target.classList.contains('page-del')||e.target.classList.contains('pg-col-btn')||e.target.classList.contains('page-addsub'))return;
    loadPage(pg.id);
  });

  // ── Drag: full cross-level reordering ──
  tab.draggable=true;

  tab.addEventListener('dragstart',e=>{
    draggedPageId=pg.id;
    e.dataTransfer.setData('text/plain', String(pg.id));
    e.dataTransfer.effectAllowed='move';
    setTimeout(()=>tab.classList.add('dragging-page'),0);
  });

  tab.addEventListener('dragend',()=>{
    draggedPageId=null;
    tab.classList.remove('dragging-page');
    clearDragStyles();
  });

  tab.addEventListener('dragover',e=>{
    e.preventDefault();
    const fromId=draggedPageId;
    if(!fromId||fromId===pg.id){clearDragStyles();return;}
    const dragged=findPage(fromId);
    if(!dragged||isDescendant(dragged,pg.id)){clearDragStyles();return;}
    const zone=getDropZone(e,tab);
    if(zone==='into'&&level>=2){clearDragStyles();return;}
    e.dataTransfer.dropEffect='move';
    clearDragStyles();
    if(zone==='into'){tab.classList.add('drag-over-into');}
    else{showDragLine(tab,zone);}
  });

  tab.addEventListener('dragleave',e=>{
    if(!tab.contains(e.relatedTarget)){
      tab.classList.remove('drag-over-above','drag-over-below','drag-over-into');
      // only hide line if not moving to another tab
      if(!e.relatedTarget||!e.relatedTarget.closest('.page-tab')){
        const dl=$('drag-line');if(dl)dl.style.display='none';
      }
    }
  });

  tab.addEventListener('drop',e=>{
    e.preventDefault();
    clearDragStyles();
    const fromId=+(e.dataTransfer.getData('text/plain')||draggedPageId||0);
    if(!fromId||fromId===pg.id)return;
    const dragged=findPage(fromId);
    if(!dragged||isDescendant(dragged,pg.id))return;
    const zone=getDropZone(e,tab);
    if(zone==='into'&&level>=2)return;

    if(zone==='into'){
      // Resolve target BEFORE extracting (extraction doesn't affect 'into' case)
      extractPage(fromId);
      pg.children=pg.children||[];
      dragged.parentId=pg.id;
      pg.children.push(dragged);
      pg.collapsed=false;
    } else {
      // Resolve sibling list and index BEFORE extracting so indices stay correct
      const targetParent=pg.parentId?findPage(pg.parentId):null;
      const sibList=targetParent?targetParent.children:curNb().pages;
      let toIdx=sibList.findIndex(p=>p.id===pg.id);
      const newParentId=pg.parentId||null;
      // Now extract (may shift indices if dragged is in same list before target)
      const fromSibList=dragged.parentId?((findPage(dragged.parentId)||{}).children||curNb().pages):curNb().pages;
      const fromIdx=fromSibList.findIndex(p=>p.id===fromId);
      const sameList=fromSibList===sibList;
      extractPage(fromId);
      // If same list and dragged was before target, index shifts by -1
      if(sameList&&fromIdx<toIdx)toIdx--;
      dragged.parentId=newParentId;
      sibList.splice(zone==='above'?toIdx:toIdx+1,0,dragged);
    }
    renderSidebar();sched();
  });

  return tab;
}

function renderSidebar(){
  pagesList.innerHTML='';
  const nb=curNb();if(!nb)return;
  function renderLevel(pages,level){
    pages.forEach(pg=>{
      pagesList.appendChild(mkTab(pg,level));
      if(!pg.collapsed&&pg.children&&pg.children.length>0)renderLevel(pg.children,level+1);
    });
  }
  renderLevel(nb.pages,0);
  // re-highlight active
  if(nb.activePageId)pagesList.querySelectorAll('.page-tab').forEach(t=>t.classList.toggle('active',+t.dataset.id===nb.activePageId));
}

    // execCommand uses font-family string but fontName only accepts family name
    // Fix: wrap selected text in a span with style
    document.querySelectorAll('font[face]').forEach(el=>{
      el.style.fontFamily=el.getAttribute('face');
      el.removeAttribute('face');

    // No selection - apply to whole note body

    if(body&&body.classList.contains('nbody')){

});

function drawArrow(ctx,x1,y1,x2,y2,size){
  const angle=Math.atan2(y2-y1,x2-x1);
  const hw=Math.max(size*4,18);  // bigger head
  const hw2=Math.max(size*1.2,5); // tail width for filled body
  // Shorten line so it doesn't poke through head
  const ex=x2-hw*0.7*Math.cos(angle);
  const ey=y2-hw*0.7*Math.sin(angle);
  // Draw shaft
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(ex,ey);ctx.stroke();
  // Draw sharp arrowhead - narrow angle PI/9 for pointy look
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hw*Math.cos(angle-Math.PI/9),y2-hw*Math.sin(angle-Math.PI/9));
  ctx.lineTo(x2-hw*0.55*Math.cos(angle),y2-hw*0.55*Math.sin(angle));
  ctx.lineTo(x2-hw*Math.cos(angle+Math.PI/9),y2-hw*Math.sin(angle+Math.PI/9));
  ctx.closePath();ctx.fill();
}

function floodFill(ctx,x,y,fillColor){
  const w=ctx.canvas.width,h=ctx.canvas.height;
  const img=ctx.getImageData(0,0,w,h);
  const data=img.data;
  const idx=(y*w+x)*4;
  const tr=data[idx],tg=data[idx+1],tb=data[idx+2],ta=data[idx+3];
  const fr=parseInt(fillColor.slice(1,3),16),fg=parseInt(fillColor.slice(3,5),16),fb=parseInt(fillColor.slice(5,7),16);
  if(tr===fr&&tg===fg&&tb===fb)return;
  const stack=[[x,y]];
  while(stack.length){
    const [cx,cy]=stack.pop();
    if(cx<0||cx>=w||cy<0||cy>=h)continue;
    const i=(cy*w+cx)*4;
    if(data[i]!==tr||data[i+1]!==tg||data[i+2]!==tb||data[i+3]!==ta)continue;
    data[i]=fr;data[i+1]=fg;data[i+2]=fb;data[i+3]=Math.round(drawOpacity*255);
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(img,0,0);
}

function wireDrawCanvas(dbox){
  const canvas=dbox.querySelector('.draw-canvas');
  const ctx=canvas.getContext('2d');
  let snapImg=null; // for shapes preview

  function getPos(e){
    const r=canvas.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    return{x:(clientX-r.left),y:(clientY-r.top)};
  }

  canvas.addEventListener('mousedown',e=>{
    if(activeDbox!==dbox)return;
    e.stopPropagation();
    const {x,y}=getPos(e);
    isDrawing=true;drawStartX=x;drawStartY=y;

    if(drawTool==='fill'){
      ctx.globalAlpha=drawOpacity;
      floodFill(ctx,Math.round(x),Math.round(y),drawColor);
      ctx.globalAlpha=1;
      pushHistory(dbox);isDrawing=false;return;
    }
    if(drawTool==='text'){
      // Start drag to define text box
      isDrawing=false; // handled separately
      startTextDrag(dbox,x,y,e);
      return;
    }
    if(drawTool==='pen'||drawTool==='eraser'){
      ctx.save();
      ctx.globalCompositeOperation=drawTool==='eraser'?'destination-out':'source-over';
      ctx.globalAlpha=drawTool==='eraser'?1:drawOpacity;
      ctx.strokeStyle=drawColor;ctx.lineWidth=drawSize;
      ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(x,y);ctx.restore();
    }
    if(['line','rect','ellipse','select','arrow'].includes(drawTool)){
      snapImg=ctx.getImageData(0,0,canvas.width,canvas.height);
    }
  });

  canvas.addEventListener('mousemove',e=>{
    if(!isDrawing||activeDbox!==dbox)return;
    const {x,y}=getPos(e);
    ctx.save();
    if(drawTool==='pen'||drawTool==='eraser'){
      ctx.globalCompositeOperation=drawTool==='eraser'?'destination-out':'source-over';
      ctx.globalAlpha=drawTool==='eraser'?1:drawOpacity;
      ctx.strokeStyle=drawColor;ctx.lineWidth=drawSize;
      ctx.lineCap='round';ctx.lineJoin='round';
      ctx.lineTo(x,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);
    } else if(drawTool==='line'||drawTool==='rect'||drawTool==='ellipse'||drawTool==='select'||drawTool==='arrow'){
      ctx.putImageData(snapImg,0,0);
      ctx.globalAlpha=drawOpacity;ctx.strokeStyle=drawColor;ctx.lineWidth=drawSize;
      ctx.lineCap='round';
      if(drawTool==='line'){
        ctx.beginPath();ctx.moveTo(drawStartX,drawStartY);ctx.lineTo(x,y);ctx.stroke();
      } else if(drawTool==='arrow'){
        ctx.save();ctx.fillStyle=drawColor;ctx.strokeStyle=drawColor;
        drawArrow(ctx,drawStartX,drawStartY,x,y,drawSize);
        ctx.restore();
      } else if(drawTool==='rect'){
        ctx.strokeRect(drawStartX,drawStartY,x-drawStartX,y-drawStartY);
      } else if(drawTool==='ellipse'){
        ctx.beginPath();
        ctx.ellipse(drawStartX+(x-drawStartX)/2,drawStartY+(y-drawStartY)/2,
          Math.abs(x-drawStartX)/2,Math.abs(y-drawStartY)/2,0,0,2*Math.PI);
        ctx.stroke();
      } else if(drawTool==='select'){
        ctx.putImageData(snapImg,0,0);
        ctx.save();ctx.globalAlpha=1;ctx.strokeStyle='#4a9eff';ctx.lineWidth=1;
        ctx.setLineDash([4,4]);
        ctx.strokeRect(drawStartX,drawStartY,x-drawStartX,y-drawStartY);
        ctx.restore();
      }
    }
    ctx.restore();
  });

  function onMouseUp(e){
    if(!isDrawing||activeDbox!==dbox)return;
    isDrawing=false;snapImg=null;
    pushHistory(dbox);
  }
  canvas.addEventListener('mouseup',onMouseUp);
  canvas.addEventListener('mouseleave',onMouseUp);
}

function mkDrawBox(opts={}){
  opts.name=opts.name||'Drawing';
  let drawLayer=opts.layer||'back'; // 'back' or 'front'
  const id=opts.id||String(gId());
  const el=document.createElement('div');
  el.className='draw-box draw-inactive';
  el.dataset.id=id;
  el.dataset.type='drawing';
  el.style.left=(opts.x||100)+'px';
  el.style.top=(opts.y||100)+'px';
  el.style.width=(opts.w||400)+'px';
  el.style.height=(opts.h||300)+'px';
  el.dataset.layer=drawLayer;
  el.style.zIndex=drawLayer==='front'?nZDrawFront():nZDraw();

  el.innerHTML=`
    <div class="draw-header">
      <div class="draw-header-left">✏ <span class="draw-name" title="Double-click to rename">${opts.name}</span></div>
      <div class="draw-header-right">
        <button class="draw-hbtn layer-btn" title="Send to front">↑</button>
        <button class="draw-hbtn edit-btn" title="Edit drawing">Edit</button>
        <button class="draw-hbtn del-btn" title="Delete drawing" style="color:var(--danger)">✕</button>
      </div>
    </div>
    <div class="draw-canvas-wrap">
      <canvas class="draw-canvas"></canvas>
    </div>
    <div class="dr-n"></div>
    <div class="dr-s"></div>
    <div class="dr-w"></div>
    <div class="dr-e"></div>
    <div class="dr-nw"></div>
    <div class="dr-ne"></div>
    <div class="dr-sw"></div>
    <div class="dr-se">◢</div>`;

  // Size canvas to match box
  function sizeCanvasWithOffset(offX,offY){
    const wrap=el.querySelector('.draw-canvas-wrap');
    const canvas=el.querySelector('.draw-canvas');
    const newW=Math.max(wrap.clientWidth||1,1);
    const newH=Math.max(wrap.clientHeight||1,1);
    if(canvas.width===newW&&canvas.height===newH&&offX===0&&offY===0)return;
    const tmpCanvas=document.createElement('canvas');
    tmpCanvas.width=canvas.width;tmpCanvas.height=canvas.height;
    tmpCanvas.getContext('2d').drawImage(canvas,0,0);
    canvas.width=newW;canvas.height=newH;
    // Draw old content offset by how much new space was added at top/left
    canvas.getContext('2d').drawImage(tmpCanvas,offX,offY);
  }
  function sizeCanvas(){sizeCanvasWithOffset(0,0);}

  // Restore saved image if any
  function restoreImage(){
    if(!opts.imgdata)return;
    const img=new Image();
    img.onload=()=>{el.querySelector('.draw-canvas').getContext('2d').drawImage(img,0,0);};
    img.src=opts.imgdata;
  }

  // Edit button
  el.querySelector('.edit-btn').addEventListener('click',e=>{
    e.stopPropagation();
    setTimeout(sizeCanvas,20);
    activateDrawBox(el);
  });

  // Double-click name label to rename - delegated on header-left so it survives re-renders
  el.querySelector('.draw-header-left').addEventListener('dblclick',e=>{
    e.stopPropagation();
    const nameEl=el.querySelector('.draw-name');
    if(!nameEl||e.target.tagName==='INPUT')return;
    const inp=document.createElement('input');
    inp.value=nameEl.textContent;
    inp.style.cssText='background:none;border:none;border-bottom:1px solid var(--accent);outline:none;font-family:Syne,sans-serif;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#6b6560;width:90px;padding:0';
    nameEl.replaceWith(inp);inp.focus();inp.select();
    const done=()=>{
      const newName=inp.value.trim()||'Drawing';
      const span=document.createElement('span');
      span.className='draw-name';span.title='Double-click to rename';
      span.textContent=newName;
      inp.replaceWith(span);
      sched();
    };
    inp.addEventListener('blur',done);
    inp.addEventListener('keydown',ev=>{ev.stopPropagation();if(ev.key==='Enter')inp.blur();});
  });

  // Delete button
  el.querySelector('.del-btn').addEventListener('click',e=>{
    e.stopPropagation();
    inlineConfirm(el,'Delete this drawing?',()=>{
    if(activeDbox===el)deactivateDrawBox();
    delete drawHistory[id];
    el.remove();sched();});
  });

  // Layer toggle
  const layerBtn=el.querySelector('.layer-btn');
  function updateLayerBtn(){
    layerBtn.textContent=drawLayer==='front'?'↓':'↑';
    layerBtn.title=drawLayer==='front'?'Send to back':'Bring to front';
  }
  updateLayerBtn();
  layerBtn.addEventListener('click',e=>{
    e.stopPropagation();
    drawLayer=drawLayer==='front'?'back':'front';
    el.dataset.layer=drawLayer;
    el.dataset.layer=drawLayer;
  el.style.zIndex=drawLayer==='front'?nZDrawFront():nZDraw();
    updateLayerBtn();
    sched();
  });

  // Drag (inactive mode only - full header)
  mkDragDraw(el,el.querySelector('.draw-header'));

  // 8-direction resize
  (function(){
    const dirs={
      'dr-n':  {ns:-1,ew:0,ny:true},
      'dr-s':  {ns:1, ew:0,ny:false},
      'dr-w':  {ns:0, ew:-1,nx:true},
      'dr-e':  {ns:0, ew:1, nx:false},
      'dr-nw': {ns:-1,ew:-1,ny:true,nx:true},
      'dr-ne': {ns:-1,ew:1, ny:true,nx:false},
      'dr-sw': {ns:1, ew:-1,ny:false,nx:true},
      'dr-se': {ns:1, ew:1, ny:false,nx:false},
    };
    let sx,sy,sw,sh,sl,st,dir,on=false;
    let snapImg=null; // snapshot at drag start - reuse each frame
    Object.entries(dirs).forEach(([cls,d])=>{
      const hdl=el.querySelector('.'+cls);
      if(!hdl)return;
      hdl.addEventListener('mousedown',e=>{
        e.preventDefault();e.stopPropagation();on=true;dir=d;
        sx=e.clientX;sy=e.clientY;
        sw=el.offsetWidth;sh=el.offsetHeight;
        sl=parseInt(el.style.left)||0;st=parseInt(el.style.top)||0;
        // Snapshot current drawing ONCE at drag start
        const canvas=el.querySelector('.draw-canvas');
        const tmp=document.createElement('canvas');
        tmp.width=canvas.width;tmp.height=canvas.height;
        tmp.getContext('2d').drawImage(canvas,0,0);
        snapImg=tmp;
      });
    });
    document.addEventListener('mousemove',e=>{
      if(!on)return;
      const dx=(e.clientX-sx)/zoom, dy=(e.clientY-sy)/zoom;
      let offX=0,offY=0;
      if(dir.ew!==0){
        const newW=Math.max(200, sw + dir.ew*dx);
        if(dir.nx){
          // Pulling left edge: new space on left, drawing shifts RIGHT by growth
          offX=newW-sw;
          el.style.left=(sl+sw-newW)+'px';
        }
        el.style.width=newW+'px';
      }
      if(dir.ns!==0){
        const newH=Math.max(100, sh + dir.ns*dy);
        if(dir.ny){
          // Pulling top edge: new space on top, drawing shifts DOWN by growth
          offY=newH-sh;
          el.style.top=(st+sh-newH)+'px';
        }
        el.style.height=newH+'px';
      }
      // Resize canvas and redraw from SNAPSHOT (not accumulating)
      const canvas=el.querySelector('.draw-canvas');
      const wrap=el.querySelector('.draw-canvas-wrap');
      const newW=Math.max(wrap.clientWidth||1,1);
      const newH=Math.max(wrap.clientHeight||1,1);
      canvas.width=newW;canvas.height=newH;
      if(snapImg)canvas.getContext('2d').drawImage(snapImg,offX,offY);
    });
    document.addEventListener('mouseup',()=>{
      if(on){on=false;snapImg=null;pushHistory(el);sched();}
    });
  })();

  // Wire drawing
  wireDrawCanvas(el);

  // Double-click to activate
  el.addEventListener('dblclick',e=>{

  canvas.addEventListener('mousedown',e=>{
    if(el.classList.contains('draw-inactive'))return;

  });

  mkGroupDrag(el);
  ci.appendChild(el);

  // Init canvas size and restore image
  setTimeout(()=>{sizeCanvas();restoreImage();},30);

  return el;
}
