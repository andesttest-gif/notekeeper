      </div>
      <button class="sudoku-apply-btn">▶ New Game</button>
    </div>`;

  // ── State ──────────────────────────────────────────
  const saved=opts.state?JSON.parse(opts.state):null;
  let difficulty=saved?saved.difficulty:'medium';
  let puzzle=saved?saved.puzzle:null;
  let solution=saved?saved.solution:null;
  let userBoard=saved?saved.userBoard:null;
  let selectedNum=null;
  let widgetState='inactive_paused';
  let showCfg=false;

  const gridEl=el.querySelector('.sudoku-grid');
  const numpadEl=el.querySelector('.sudoku-numpad');
  const cfgEl=el.querySelector('.sudoku-cfg');

  function newGame(){
    const gen=generateSudoku(difficulty);
    puzzle=gen.puzzle;
    solution=gen.solution;
    userBoard=puzzle.slice();
    selectedNum=null;
    saveState();
    render();
  }

  function saveState(){
    el.dataset.state=JSON.stringify({difficulty,puzzle,solution,userBoard});
    sched();
  }

  function renderGrid(){
    gridEl.innerHTML='';
    for(let i=0;i<81;i++){
      const cell=document.createElement('div');
      cell.className='sudoku-cell';
      const row=Math.floor(i/9),col=i%9;
      // Box borders
      if(col===2||col===5)cell.classList.add('box-right');
      if(row===2||row===5)cell.classList.add('box-bottom');
      const val=userBoard[i];
      const isGiven=puzzle[i]!==0;
      if(isGiven)cell.classList.add('given');
      if(val!==0)cell.textContent=val;
      // Highlight cells matching selected number
      if(selectedNum&&val===selectedNum)cell.classList.add('highlight');
      cell.addEventListener('click',e=>{
        e.stopPropagation();
        activate();
        if(isGiven)return;
        if(selectedNum===null)return;
        if(selectedNum===0){userBoard[i]=0;}
        else{userBoard[i]=selectedNum;}
        saveState();
        renderGrid();
      });
      gridEl.appendChild(cell);
    }
  }

  function renderNumpad(){
    numpadEl.innerHTML='';
    const nums=[1,2,3,4,5,6,7,8,9,0];
    nums.forEach(n=>{
      const btn=document.createElement('button');
      btn.className='sudoku-num'+(selectedNum===n?' active-num':'');
      btn.textContent=n===0?'⌫':String(n);
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        activate();
        selectedNum=selectedNum===n?null:n;
        renderNumpad();
        renderGrid();
      });
      numpadEl.appendChild(btn);
    });
  }

  function render(){
    renderGrid();
    renderNumpad();
    // Sync difficulty buttons
    cfgEl.querySelectorAll('[data-diff]').forEach(b=>{
      b.classList.toggle('active',b.dataset.diff===difficulty);
    });
  }

  function checkSolution(){
    let hasError=false;
    gridEl.querySelectorAll('.sudoku-cell').forEach((cell,i)=>{
      cell.classList.remove('error');
      if(userBoard[i]!==0&&userBoard[i]!==solution[i]){
        cell.classList.add('error');
        hasError=true;
      }
    });
    if(!hasError&&userBoard.every(v=>v!==0)){
      gridEl.querySelectorAll('.sudoku-cell').forEach(c=>c.style.background='rgba(100,200,100,.15)');
    }
  }

  // ── Widget states ─────────────────────────────────
  function activate(){
    widgetState='active';
    el.classList.add('sudoku-active');
    el.style.zIndex=nZWidget();
    ci.querySelectorAll('.sudoku-node.sudoku-active').forEach(s=>{
      if(s!==el)s.classList.remove('sudoku-active');
    });
  }

  function deactivate(){
    widgetState='inactive_paused';
    el.classList.remove('sudoku-active');
  }

  el.addEventListener('sudoku-activate',activate);
  el.addEventListener('sudoku-deactivate',deactivate);

  // ── Controls ──────────────────────────────────────
  el.querySelector('.sudoku-check-btn').addEventListener('click',e=>{e.stopPropagation();activate();checkSolution();});
  el.querySelector('.sudoku-new-btn').addEventListener('click',e=>{e.stopPropagation();activate();newGame();});

  el.querySelector('.sudoku-settings-toggle').addEventListener('mousedown',e=>e.stopPropagation());
  el.querySelector('.sudoku-settings-toggle').addEventListener('click',e=>{
    e.stopPropagation();
    showCfg=!showCfg;
    cfgEl.style.display=showCfg?'flex':'none';
    cfgEl.style.flexDirection='column';
  });

  el.querySelector('.sudoku-del').addEventListener('mousedown',e=>e.stopPropagation());
  el.querySelector('.sudoku-del').addEventListener('click',e=>{
    e.stopPropagation();
    inlineConfirm(el,'Remove Sudoku?',()=>{el.remove();sched();});
  });

  cfgEl.querySelectorAll('[data-diff]').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      difficulty=b.dataset.diff;
      cfgEl.querySelectorAll('[data-diff]').forEach(x=>x.classList.toggle('active',x.dataset.diff===difficulty));
    });
  });

  el.querySelector('.sudoku-apply-btn').addEventListener('click',e=>{
    e.stopPropagation();
    showCfg=false;
    cfgEl.style.display='none';
    newGame();
  });

  // Click body → activate
  el.querySelector('.sudoku-body').addEventListener('click',e=>{e.stopPropagation();activate();});
  el.querySelector('.sudoku-body').addEventListener('mousedown',e=>{if(!e.target.closest('.sudoku-cell')&&!e.target.closest('.sudoku-num')&&!e.target.closest('.sudoku-ctrl-btn'))e.stopPropagation();});

  // ── Drag ──────────────────────────────────────────
  let gsx,gsy,gsl,gst;
  function onSMove(e){el.style.left=Math.max(0,gsl+(e.clientX-gsx)/zoom)+'px';el.style.top=Math.max(0,gst+(e.clientY-gsy)/zoom)+'px';}
  function onSUp(){document.removeEventListener('mousemove',onSMove);document.removeEventListener('mouseup',onSUp);sched();}
  el.querySelector('.sudoku-header').addEventListener('mousedown',e=>{
    if(e.target.classList.contains('sudoku-header-btn'))return;
    e.preventDefault();e.stopPropagation();
    el.dispatchEvent(new CustomEvent('sudoku-activate'));
    gsx=e.clientX;gsy=e.clientY;
    gsl=parseInt(el.style.left)||0;gst=parseInt(el.style.top)||0;
    el.style.zIndex=nZWidget();
    document.addEventListener('mousemove',onSMove);
    document.addEventListener('mouseup',onSUp);
  });

  mkGroupDrag(el);
  ci.appendChild(el);

  // ── Init ──────────────────────────────────────────
  if(puzzle){render();}
  else{newGame();}
  return el;
}

const CODE_LANGS=['python','sql','javascript','bash','json','plaintext'];

function mkCodeNode(opts={}){
  const id=opts.id||String(gId());
  const lang=opts.lang||'python';
  const el=document.createElement('div');
  el.className='code-node';
  el.dataset.id=id;
  el.dataset.lang=lang;
  el.style.cssText=`left:${opts.x||100}px;top:${opts.y||100}px;width:${opts.w||420}px;height:${opts.h||320}px;z-index:${nZ()}`;

  el.innerHTML=`
    <div class="code-node-header">
      <span class="code-node-icon">⌨</span>
      <span class="code-node-title" title="Double-click to rename">${esc(opts.title||'Untitled')}</span>
      <select class="code-lang">${CODE_LANGS.map(l=>`<option value="${l}"${l===lang?' selected':''}>${l}</option>`).join('')}</select>
      <button class="code-run-btn${(lang==='python'||lang==='sql')?' visible':''}" title="Run">▶ Run</button>
      <button class="code-copy" title="Copy code">⎘ Copy</button>
      <button class="code-del-btn" title="Delete">✕</button>
    </div>
    <textarea class="code-editor" spellcheck="false" placeholder="# Type code here...">${esc(opts.code||'')}</textarea>
    <pre class="code-highlighted" style="display:none"><code class="code-hl-block"></code></pre>
    <div class="code-output-resizer" style="display:none"></div>
    <div class="code-output" style="display:none"></div>
    <div class="code-node-rsz">◢</div>`;

  const editor=el.querySelector('.code-editor');
  const highlighted=el.querySelector('.code-highlighted');
  const hlBlock=el.querySelector('.code-hl-block');
  const langSel=el.querySelector('.code-lang');
  const outputEl=el.querySelector('.code-output');
  const outputResizer=el.querySelector('.code-output-resizer');

  // ── States: unselected → selected → edit ─────────────
  function selectNode(){
    ci.querySelectorAll('.code-node.code-selected,.code-node.code-edit').forEach(n=>{if(n!==el){n.classList.remove('code-selected','code-edit');}});
    el.classList.add('code-selected');
    el.classList.remove('code-edit');
    el.style.zIndex=nZ();
    // Blur editor — exitEdit() will handle showHighlighted via blur timeout
    if(document.activeElement===editor)editor.blur();
  }

  function enterEdit(){
    if(el.classList.contains('code-edit'))return; // already in edit state
    const h=el.offsetHeight;
    highlighted.style.display='none';
    editor.style.display='';
    editor.style.height='auto';
    el.style.height=h+'px';
    el.classList.add('code-selected','code-edit');
    if(document.activeElement!==editor)editor.focus();
  }

  function exitEdit(){
    el.classList.remove('code-edit'); // code-selected only removed by canvas click
    if(!editor.value.trim()){editor.style.display='';highlighted.style.display='none';return;}
    el.style.height=el.offsetHeight+'px';
    hlBlock.textContent=editor.value;
    hlBlock.className='code-hl-block';
    if(window.hljs){
      const lng=langSel.value==='plaintext'?'plaintext':langSel.value;
      try{hlBlock.innerHTML=window.hljs.highlight(editor.value,{language:lng}).value;}
      catch(e){hlBlock.textContent=editor.value;}
    }
    editor.style.display='none';
    highlighted.style.display='block';
  }

  // Click highlighted → enter edit
  highlighted.addEventListener('click',e=>{e.stopPropagation();enterEdit();});

  // Direct textarea click → enter edit
  editor.addEventListener('mousedown',e=>e.stopPropagation());


  // Editor focus → enter edit state
  editor.addEventListener('focus',()=>enterEdit());

  // Editor focus → enter edit state
  editor.addEventListener('focus',()=>enterEdit());

  // Blur editor → exit edit (unless focus stays within node)
  editor.addEventListener('blur',()=>{
    setTimeout(()=>{if(!el.contains(document.activeElement))exitEdit();},100);
  });

  // ── Editor keyboard ───────────────────────────────────
  editor.addEventListener('keydown',e=>{
    e.stopPropagation();
    if(e.key==='Tab'){
      e.preventDefault();
      const s=editor.selectionStart,end=editor.selectionEnd;
      editor.value=editor.value.slice(0,s)+'    '+editor.value.slice(end);
      editor.selectionStart=editor.selectionEnd=s+4;
    }
    if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){
      e.preventDefault();
      const btn=el.querySelector('.code-run-btn');
      if(btn&&btn.classList.contains('visible')&&!btn.classList.contains('loading'))btn.click();
    }
  });
  editor.addEventListener('input',sched);

  // ── Language selector ─────────────────────────────────
  langSel.addEventListener('change',()=>{
    el.dataset.lang=langSel.value;
    el.querySelector('.code-run-btn').classList.toggle('visible',langSel.value==='python'||langSel.value==='sql');
    if(highlighted.style.display!=='none')exitEdit();
    sched();
  });
  langSel.addEventListener('mousedown',e=>e.stopPropagation());

  // ── Title rename on dblclick ──────────────────────────
  const titleSpan=el.querySelector('.code-node-title');
  titleSpan.addEventListener('dblclick',e=>{
    e.stopPropagation();
    const inp=document.createElement('input');
    inp.value=titleSpan.textContent;
    inp.style.cssText="background:none;border:none;outline:none;color:#fff;font-family:'Syne',sans-serif;font-size:12px;flex:1;min-width:0;padding:0 4px;letter-spacing:.03em;width:100%";
    titleSpan.replaceWith(inp);
    inp.focus();inp.select();
    const done=()=>{titleSpan.textContent=inp.value.trim()||'Untitled';inp.replaceWith(titleSpan);sched();};
    inp.addEventListener('blur',done);
    inp.addEventListener('keydown',e2=>{e2.stopPropagation();if(e2.key==='Enter')inp.blur();});
    inp.addEventListener('mousedown',e2=>e2.stopPropagation());
  });

  // ── Copy code button ──────────────────────────────────
  el.querySelector('.code-copy').addEventListener('click',e=>{
    e.stopPropagation();
    navigator.clipboard?.writeText(editor.value).then(()=>{
      const btn=el.querySelector('.code-copy');
      btn.textContent='✓ Copied';
      setTimeout(()=>btn.textContent='⎘ Copy',1500);
    });
  });

  // ── Run button ────────────────────────────────────────
  el.querySelector('.code-run-btn').addEventListener('click',e=>{
    e.stopPropagation();
    const btn=el.querySelector('.code-run-btn');
    if(btn.classList.contains('loading'))return;
  if(el.dataset.lang==='sql')runSQL(editor.value,outputEl);
    else runPython(editor.value,outputEl);
  });

  // ── Delete button ─────────────────────────────────────
  el.querySelector('.code-del-btn').addEventListener('click',e=>{
    e.stopPropagation();
    inlineConfirm(el,'Delete this code node?',()=>{el.remove();sched();});
  });

  // ── Output resizer (temporary listeners) ──────────────
  let rsOn=false,rsY=0,rsH=0;
  function onRsMove(e){if(!rsOn)return;outputEl.style.height=Math.max(60,rsH-(e.clientY-rsY))+'px';}
  function onRsUp(){rsOn=false;document.removeEventListener('mousemove',onRsMove);document.removeEventListener('mouseup',onRsUp);}
  outputResizer.addEventListener('mousedown',e=>{
    e.preventDefault();e.stopPropagation();
    rsOn=true;rsY=e.clientY;rsH=outputEl.offsetHeight;
    document.addEventListener('mousemove',onRsMove);
    document.addEventListener('mouseup',onRsUp);
  });

  // ── Drag by header (temporary listeners) ──────────────
  let sx,sy,sl,st2,on=false;
  function onCnMove(e){if(!on)return;el.style.left=Math.max(0,sl+(e.clientX-sx)/zoom)+'px';el.style.top=Math.max(0,st2+(e.clientY-sy)/zoom)+'px';}
  function onCnUp(){if(!on)return;on=false;document.removeEventListener('mousemove',onCnMove);document.removeEventListener('mouseup',onCnUp);sched();}
  el.querySelector('.code-node-header').addEventListener('mousedown',e=>{
    if(e.target.tagName==='SELECT'||e.target.tagName==='BUTTON'||e.target.tagName==='INPUT')return;
    e.preventDefault();e.stopPropagation();
    selectNode();
    on=true;sx=e.clientX;sy=e.clientY;
    sl=parseInt(el.style.left)||0;st2=parseInt(el.style.top)||0;
    document.addEventListener('mousemove',onCnMove);
    document.addEventListener('mouseup',onCnUp);
  });

  // ── Resize ────────────────────────────────────────────
  mkResize(el,el.querySelector('.code-node-rsz'));
  mkGroupDrag(el);
  ci.appendChild(el);
  if(opts.code)setTimeout(exitEdit,50);
  return el;
}

function copySelectedNode(){
  // Find selected node
  const freeEl=document.querySelector('.free-note.fn-selected,.free-note.fn-editing');
  const drawEl=activeDbox||document.querySelector('.draw-box.draw-selected');
  const tblEl=document.querySelector('.tbl-box.tbl-selected');
  const codeEl=document.querySelector('.code-node.code-selected');

  if(freeEl){
    nodeClipboard={type:'free',opts:{
      w:parseInt(freeEl.style.width)||240,
      h:parseInt(freeEl.style.height)||96,
      html:freeEl.querySelector('.fn-body').innerHTML,
      bg:freeEl.dataset.bg||'transparent',
      border:freeEl.dataset.border||'0',
    }};
  } else if(drawEl){
    const cv=drawEl.querySelector('.draw-canvas');
    nodeClipboard={type:'draw',opts:{
      w:parseInt(drawEl.style.width)||400,
      h:parseInt(drawEl.style.height)||300,
      imgdata:cv?cv.toDataURL():'',
    }};
  } else if(tblEl){
    // Save table state via savePage approach
    savePage();
    const nb=curNb();
    const pg=nb&&nb.activePageId?findPage(nb.activePageId):null;
    if(pg){
      const tbl=pg.tables.find(t=>t.id===tblEl.dataset.id);
      if(tbl)nodeClipboard={type:'table',opts:JSON.parse(JSON.stringify(tbl))};
    }
  } else if(codeEl){
    nodeClipboard={type:'code',opts:{
      w:parseInt(codeEl.style.width)||420,
      h:parseInt(codeEl.style.height)||320,
      lang:codeEl.dataset.lang||'python',
      code:codeEl.querySelector('.code-editor').value,
      title:codeEl.querySelector('.code-node-title')?.textContent||'Untitled',
    }};
  }

  if(nodeClipboard){
    updateCopyPasteBtns();
    // Brief flash on copy button
    const btn=$('copy-node-btn');
    if(btn){btn.style.color='var(--accent)';setTimeout(()=>btn.style.color='',500);}
  }
}

function pasteNode(){
  if(!nodeClipboard)return;
  // Paste at center of current viewport
  const cr=canvas.getBoundingClientRect();
  const x=(canvas.scrollLeft+cr.width/2)/zoom - 120;
  const y=(canvas.scrollTop+cr.height/2)/zoom - 60;
  const opts={...nodeClipboard.opts, x:Math.max(0,x), y:Math.max(0,y), id:String(gId())};

  if(nodeClipboard.type==='free') mkFreeNote(opts);
  else if(nodeClipboard.type==='draw') mkDrawBox(opts);
  else if(nodeClipboard.type==='table'){opts.id=String(gId());mkTable(opts);}
  else if(nodeClipboard.type==='code') mkCodeNode(opts);
  sched();
}

function updateCopyPasteBtns(){
  const copyBtn=$('copy-node-btn');
  const pasteBtn=$('paste-node-btn');
  const hasSelection=!!(
    document.querySelector('.free-note.fn-selected,.free-note.fn-editing')||
    document.querySelector('.draw-box.draw-selected')||
    document.querySelector('.tbl-box.tbl-selected')||
    document.querySelector('.code-node.code-selected')
  );
  if(copyBtn)copyBtn.style.opacity=hasSelection?'1':'.4';
  if(pasteBtn)pasteBtn.style.opacity=nodeClipboard?'1':'.4';
}

// ── KEYBOARD DISPATCHER ─────────────────────────────────
document.addEventListener('keydown',e=>{
  const ae=document.activeElement;
  const inInput=ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.isContentEditable;
  const badgeConfirmVisible=document.getElementById('sel-badge-confirm')?.style.display==='flex';

  // ── Enter: badge confirm ──────────────────────────────
  if(e.key==='Enter'&&badgeConfirmVisible){
    e.preventDefault();e.stopPropagation();
    document.getElementById('sel-badge-yes').click();
    return;
  }

  // ── Ctrl+C: copy node ────────────────────────────────
  if((e.ctrlKey||e.metaKey)&&e.key==='c'&&!e.shiftKey&&!inInput){
    e.preventDefault();copySelectedNode();return;
  }

  // ── Ctrl+V: paste node ───────────────────────────────
  if((e.ctrlKey||e.metaKey)&&e.key==='v'&&!e.shiftKey&&!inInput){
    e.preventDefault();pasteNode();return;
  }

  // ── Delete/Backspace ─────────────────────────────────
  if((e.key==='Delete'||e.key==='Backspace')&&ae===document.body){
    // Multi-select takes priority
    if(canvasSel.size>0){e.preventDefault();selBadgeConfirmMode(true);return;}
    // Per-node delete
    const freeSel=document.querySelector('.free-note.fn-selected');
    if(freeSel){e.preventDefault();inlineConfirm(freeSel,'Delete this note?',()=>{freeSel.remove();sched();});return;}
    const drawSel=document.querySelector('.draw-box.draw-selected');
    if(drawSel&&!activeDbox){e.preventDefault();inlineConfirm(drawSel,'Delete this drawing?',()=>{if(activeDbox===drawSel)deactivateDrawBox();drawSel.remove();sched();});return;}
    const codeSel=document.querySelector('.code-node.code-selected:not(.code-edit)');
    if(codeSel){e.preventDefault();inlineConfirm(codeSel,'Delete this code node?',()=>{codeSel.remove();sched();});return;}
  }
});

// ── INLINE MATH ENGINE ───────────────────────────────────
function tryMathLine(){
  // Get current line text from selection
  const sel=window.getSelection();
  if(!sel||!sel.rangeCount)return null;
  const range=sel.getRangeAt(0);
  // Walk up to find the text node's line
  let node=range.startContainer;
  let text='';
  if(node.nodeType===3){text=node.textContent.slice(0,range.startOffset);}
  else{text=node.textContent||'';}
  // Get just the current line (after last newline)
  const lines=text.split('\n');
  const line=lines[lines.length-1].trimEnd();
  // Must end with =
  if(!line.endsWith('='))return null;
  const expr=line.slice(0,line.lastIndexOf('=')).trim();
  if(!expr)return null;
  try{
    const val=mathEval(expr);
    if(val===null||isNaN(val)||!isFinite(val))return null;
    // Format nicely
    const rounded=Math.round(val*1e10)/1e10;
    return String(rounded);
  }catch(e){return null;}
}

function mathEval(expr){
  // Safe math parser - no eval()
  expr=expr.trim();
  // Replace % of: "20% of 500" -> "20/100*500"
  expr=expr.replace(/(\d+(?:\.\d+)?)\s*%\s*of\s*(\d+(?:\.\d+)?)/gi,(_,a,b)=>`(${a}/100*${b})`);
  // Replace standalone %: "20%" -> "(20/100)"
  expr=expr.replace(/(\d+(?:\.\d+)?)\s*%/g,(_,a)=>`(${a}/100)`);
  // Replace ^ with **
  expr=expr.replace(/\^/g,'**');
  // Replace × ÷ with * /
  expr=expr.replace(/×/g,'*').replace(/÷/g,'/');
  // Validate: only allow numbers, operators, parens, spaces, dots
  if(!/^[\d\s\+\-\*\/\.\(\)\*]+$/.test(expr))return null;
  // Parse and evaluate using recursive descent
  return parseExpr(expr.replace(/\s+/g,''));
}

function parseExpr(s){
  let i=0;
  function peek(){return s[i];}
  function consume(){return s[i++];}
  function parseNumber(){
    let num='';
    if(peek()==='-'){num+=consume();}
    while(i<s.length&&(/[\d\.]/).test(peek()))num+=consume();
    if(num===''||num==='-')throw new Error('Expected number');
    return parseFloat(num);
  }
  function parsePrimary(){
    if(peek()==='('){
      consume();
      const val=parseAddSub();
      if(peek()===')') consume();
      return val;
    }
    return parseNumber();
  }
  function parsePow(){
    let base=parsePrimary();
    while(i<s.length&&s[i]==='*'&&s[i+1]==='*'){
      i+=2;
      const exp=parsePrimary();
      base=Math.pow(base,exp);
    }
    return base;
  }
  function parseMulDiv(){
    let left=parsePow();
    while(i<s.length&&(peek()==='*'||peek()==='/')){
      // Check it's not **
      if(peek()==='*'&&s[i+1]==='*')break;
      const op=consume();
      const right=parsePow();
      if(op==='*')left*=right;
      else{if(right===0)return NaN;left/=right;}
    }
    return left;
  }
  function parseAddSub(){
    let left=parseMulDiv();
    while(i<s.length&&(peek()==='+'||peek()==='-')){
      const op=consume();
      const right=parseMulDiv();
      if(op==='+')left+=right;else left-=right;
    }
    return left;
  }
  const result=parseAddSub();
  return result;
}
